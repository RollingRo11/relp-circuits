<script>
window.initCgLinkGraph = function({visState, renderAll, data, cgSel}){
  var {nodes, links, metadata} = data

  var c = d3.conventions({
    sel: cgSel.select('.link-graph').html(''),
    margin: {left: visState.isHideLayer ? 0 : 30, bottom: 85},
    layers: 'sccccs',
  })

  c.svgBot = c.layers[0]
  var allCtx = {
    allLinks: c.layers[1],
    pinnedLinks: c.layers[2],
    bgLinks: c.layers[3],
    clickedLinks: c.layers[4]
  }
  c.svg = c.layers[5]

  // Count max number of nodes at each context to create a polylinear x scale
  var earliestCtxWithNodes = d3.min(nodes, d => d.ctx_idx)
  var cumsum = 0
  var ctxCounts = d3.range(d3.max(nodes, d => d.ctx_idx) + 1).map(ctx_idx => {
    if (ctx_idx >= earliestCtxWithNodes) {
      var group = nodes.filter(d => d.ctx_idx === ctx_idx)
      var maxCount = d3.max([1, d3.max(d3.nestBy(group, d => d.streamIdx), e => e.length)])
      cumsum += maxCount
    }
    return {ctx_idx, maxCount, cumsum}
  })

  var xDomain = [-1].concat(ctxCounts.map(d => d.ctx_idx))
  var xRange = [0].concat(ctxCounts.map(d => d.cumsum * c.width / cumsum))
  c.x = d3.scaleLinear().domain(xDomain.map(d => d + 1)).range(xRange)

  // TODO: why this was here?
  // var yNumTicks= visState.isHideLayer ? data.byStream.length : 19
  var logitLayer = data.byStream.find(d => d[0].feature_type == 'logit');
  var yNumTicks = (logitLayer ? parseInt(logitLayer[0].layer) : 26) + 2; // +2 to account for embedding at 0 and layers starting at 1

  c.y = d3.scaleBand(d3.range(yNumTicks), [c.height, 0])

  c.yAxis = d3.axisLeft(c.y)
    .tickValues(d3.range(yNumTicks))
    .tickFormat(i => {
      if (i % 2) return

      return i == yNumTicks - 1 ? 'Lgt' : i == 0 ? 'Emb' : 'L' + (i - 1) // Subtract 1 from layer numbers
    })

  c.svgBot.append('rect').at({width: c.width, height: c.height, fill: '#F5F4EE'})
  c.svgBot.append('g').appendMany('rect', [0, yNumTicks - 1])
    .at({width: c.width, height: c.y.bandwidth(), y: c.y, fill: '#F0EEE7'})

  c.svgBot.append('g').appendMany('path', d3.range(-1, yNumTicks - 1))
    .translate(d => [0, c.y(d + 1)])
    .at({d: `M0,0H${c.width}`, stroke: 'white', strokeWidth: .5})

  c.drawAxis(c.svgBot)
  c.svgBot.select('.x').remove()
  c.svgBot.selectAll('.y line').remove()
  if (visState.isHideLayer) c.svgBot.select('.y').remove()

  // Spread nodes across each context
  // d.width is the total amount of px space in each column
  ctxCounts.forEach((d, i) => d.width = c.x(d.ctx_idx + 1) - c.x(ctxCounts[i].ctx_idx))

  // if default to 8px padding right, if pad right to center singletons
  var padR = Math.min(8, d3.min(ctxCounts.slice(1), d => d.width/2)) + 0

  // find the tightest spacing between nodes and use for all ctx (but don't go below 20)
  ctxCounts.forEach(d => d.minS = (d.width - padR)/d.maxCount)
  var overallS = Math.max(20, d3.min(ctxCounts, d => d.minS))

  // apply to nodes
  d3.nestBy(nodes, d => [d.ctx_idx, d.streamIdx].join('-')).forEach(ctxLayer => {
    var ctxWidth = c.x(ctxLayer[0].ctx_idx + 1) - c.x(ctxLayer[0].ctx_idx) - padR
    var s = Math.min(overallS, ctxWidth/ctxLayer.length)

    // sorting by pinned stacks all the links on top of each other
    // ctxLayer = d3.sort(ctxLayer, d => visState.pinnedIds.includes(d.nodeId) ? -1 : 1)
    ctxLayer = d3.sort(ctxLayer, d => -d.logitPct)
    ctxLayer.forEach((d, i) => {
      d.xOffset = d.feature_type === 'logit' ? ctxWidth - (padR/2 + i*s) : ctxWidth - (padR/2 + i*s)
      d.yOffset = 0
    })
  })
  nodes.forEach(d => d.pos = [
    c.x(d.ctx_idx) + d.xOffset,
    c.y(d.streamIdx) + c.y.bandwidth()/2 + d.yOffset
  ])


  // hover poitns
  var maxHoverDistance = 30
  c.sel
    .on('mousemove', (ev) => {
      if (ev.shiftKey) return
      var [mouseX, mouseY] = d3.pointer(ev)
      var [closestNode, closestDistance] = findClosestPoint(mouseX - c.margin.left, mouseY - c.margin.top, nodes)
      if (closestDistance > maxHoverDistance) {
        utilCg.unHoverFeature(visState, renderAll)
        utilCg.hideTooltip()
      } else if (visState.hoveredId !== closestNode) {
        utilCg.hoverFeature(visState, renderAll, closestNode)
        utilCg.showTooltip(ev, closestNode)
      }
    })
    .on('mouseleave', (ev) => {
      if (ev.shiftKey) return
      utilCg.unHoverFeature(visState, renderAll)
      utilCg.hideTooltip()
    })
    .on('click', (ev) => {
      var [mouseX, mouseY] = d3.pointer(ev)
      var [closestNode, closestDistance] = findClosestPoint(mouseX - c.margin.left, mouseY - c.margin.top, nodes)
      if (closestDistance > maxHoverDistance) {
        visState.clickedId = null
        visState.clickedCtxIdx = null
        renderAll.clickedId()
      } else {
        utilCg.clickFeature(visState, renderAll, closestNode, ev.metaKey || ev.ctrlKey)
      }
    })

  function findClosestPoint(mouseX, mouseY, points) {
    if (points.length === 0) return null

    let closestPoint = points[0]
    let closestDistance = distance(mouseX, mouseY, closestPoint.pos[0], closestPoint.pos[1])

    for (let i = 1; i < points.length; i++){
      var point = points[i]
      var dist = distance(mouseX, mouseY, point.pos[0], point.pos[1])
      if (dist < closestDistance){
        closestPoint = point
        closestDistance = dist
      }
    }
    return [closestPoint, closestDistance]

    function distance(x1, y1, x2, y2) {
      return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2))
    }
  }

  // set up dom
  var nodeSel = c.svg.appendMany('text.node', nodes)
    .translate(d => d.pos)
    .text(d => utilCg.featureTypeToText(d.feature_type))
    .at({
      fontSize: 9,
      fill: d => d.nodeColor,
      stroke: '#000',
      strokeWidth: .5,
      textAnchor: 'middle',
      dominantBaseline: 'central',
    })
    // .call(utilCg.addFeatureTooltip)
    // .call(utilCg.addFeatureEvents(visState, renderAll, ev => ev.shiftKey))

  var hoverSel = c.svg.appendMany('circle', nodes)
    .translate(d => d.pos)
    .at({r: 6, cy: .5, stroke: '#f0f', strokeWidth: 2, strokeDasharray: '2 2', fill: 'none', display: 'xnone', pointEvents: 'none'})

  links.forEach(d => {
    var [x1, y1] = d.sourceNode.pos
    var [x2, y2] = d.targetNode.pos
    d.pathStr = `M${x1},${y1}L${x2},${y2}`
  })


  function drawLinks(links, ctx, strokeWidthOffset=0, colorOverride){
    ctx.clearRect(-c.margin.left, -c.margin.top, c.totalWidth, c.totalHeight)
    d3.sort(links, d => d.strokeWidth).forEach(d => {
      ctx.beginPath()
      ctx.moveTo(d.sourceNode.pos[0], d.sourceNode.pos[1])
      ctx.lineTo(d.targetNode.pos[0], d.targetNode.pos[1])
      ctx.strokeStyle = colorOverride || d.color
      ctx.lineWidth = d.strokeWidth + strokeWidthOffset
      ctx.stroke()
    })
  }

  function filterLinks(featureIds){
    var filteredLinks = []

    featureIds.forEach(nodeId => {
      nodes.filter(n => n.nodeId == nodeId).forEach(node => {
        if (visState.linkType == 'input' || visState.linkType == 'either') {
          Array.prototype.push.apply(filteredLinks, node.sourceLinks)
        }
        if (visState.linkType == 'output' || visState.linkType == 'either') {
          Array.prototype.push.apply(filteredLinks, node.targetLinks)
        }
        if (visState.linkType == 'both') {
          Array.prototype.push.apply(filteredLinks, node.sourceLinks.filter(
            link => visState.pinnedIds.includes(link.sourceNode.nodeId)
          ))
          Array.prototype.push.apply(filteredLinks, node.targetLinks.filter(
            link => visState.pinnedIds.includes(link.targetNode.nodeId)
          ))
        }
      })
    })

    return filteredLinks
  }

  // drawLinks(links, allCtx.allLinks, 0, 'rgba(0,0,0,.05)')
  // renderAll.isShowAllLinks.fns['linkGraph'] = () => c.sel.select('canvas').st({display: visState.isShowAllLinks ? '' : 'none'})

  function renderPinnedIds(){
    drawLinks(visState.clickedId ? [] : filterLinks(visState.pinnedIds), allCtx.pinnedLinks)
    nodeSel.classed('pinned', d => visState.pinnedIds.includes(d.nodeId))
  }
  renderAll.pinnedIds.fns['linkGraph'] = renderPinnedIds

  function renderHiddenIds(){
    var hiddenIdSet = new Set(visState.hiddenIds)
    nodeSel.classed('hidden', d => hiddenIdSet.has(d.featureId))
  }
  renderAll.hiddenIds.fns['linkGraph'] = renderHiddenIds


  function renderClicked(){
    var clickedLinks = []
    if (visState.clickedId) {
      clickedLinks = links.filter(link =>
        link.sourceNode.nodeId === visState.clickedId ||
        link.targetNode.nodeId === visState.clickedId
      )
    }

    drawLinks(clickedLinks, allCtx.bgLinks, .05, '#000')
    drawLinks(clickedLinks, allCtx.clickedLinks)
    nodeSel.classed('clicked', e => e.nodeId === visState.clickedId)

    drawLinks(visState.clickedId ? [] : filterLinks(visState.pinnedIds), allCtx.pinnedLinks)


    nodeSel
      .at({fill: '#fff'})
      .filter(d => d.tmpClickedLink?.tmpColor)
      .at({fill: d => d.tmpClickedLink.tmpColor})
      .raise()
  }

  renderAll.clickedId.fns['linkGraph'] = renderClicked
  renderAll.linkType.fns['linkGraph'] = () => {
    renderPinnedIds()
    renderClicked()
  }

  renderAll.hoveredId.fns['linkGraph'] = () => {
    hoverSel.st({display: e => e.featureId == visState.hoveredId ? '' : 'none'})
  }

  // Add x axis text/lines
  var promptTicks = data.metadata.prompt_tokens.slice(earliestCtxWithNodes).map((token, i) =>{
    var ctx_idx = i + earliestCtxWithNodes
    var mNodes = nodes.filter(d => d.ctx_idx == ctx_idx)
    var hasEmbed = mNodes.some(d => d.feature_type == 'embedding')
    return {token, ctx_idx, mNodes, hasEmbed}
  })

  var xTickSel = c.svgBot.appendMany('g.prompt-token', promptTicks)
    .translate(d => [c.x(d.ctx_idx + 1), c.height])

  xTickSel.append('path').at({d: `M0,0v${-c.height}`, stroke: '#fff',strokeWidth: 1})
  xTickSel.filter(d => d.hasEmbed).append('path').at({
    stroke: '#B0AEA6',
    d: `M-${padR + 3.5},${-c.y.bandwidth()/2 + 6}V${8}`,
  })

  xTickSel.filter(d => d.hasEmbed).append('g').translate([-12, 8])
    .append('text').text(d => d.token)
    .at({
      x: -5,
      y: 2,
      textAnchor: 'end',
      transform: 'rotate(-45)',
      dominantBaseline: 'middle',
      fontSize: 12,
      // fontSize: (d, i) => c.x(i+1) - c.x(i) < 15 ? 9 : 14,
    })

  var logitTickSel = c.svgBot.append('g.axis').appendMany('g', nodes.filter(d => d.feature_type == 'logit'))
    .translate(d => d.pos)
  logitTickSel.append('path').at({
    stroke: '#B0AEA6',
    d: `M0,${-6}V${-c.y.bandwidth()/2 - 6}`,
  })
  logitTickSel.append('g').translate([-5, -c.y.bandwidth()/2 - 8])
    .append('text').text(d => d.logitToken)
    .at({
      x: 5,
      y: 2,
      textAnchor: 'start',
      transform: 'rotate(-45)',
      dominantBaseline: 'middle',
      fontSize: 12,
      // fontSize: (d, i) => c.x(i+1) - c.x(i) < 15 ? 9 : 14,
    })


  utilCg.addPinnedClickedGradient(c.svg)
}

window.init?.()

</script>
<script>
window.initCgNodeConnections = function({visState, renderAll, data, cgSel}){

  var nodeConnectionsSel = cgSel.select('.node-connections')
  var headerSel = null
  var clickedNode = null
  var featureSel = null

  function render() {
    nodeConnectionsSel.html('').st({display: 'flex', flexDirection: 'column'})
    clickedNode = data.nodes.find(e => e.nodeId === visState.clickedId)
    headerSel = nodeConnectionsSel.append('div.header-top-row.section-title').st({marginBottom: 20}).datum(clickedNode)

    if (!clickedNode) return headerSel.text('Click a feature on the left for details')

    addHeaderRow(headerSel)
    addAttrContribMaps(clickedNode)

    var types = [
      { id: 'input', title: 'Input Features'},
      { id: 'output', title: 'Output Features' }
    ]
    types.forEach(type => type.sections = ['Positive', 'Negative'].map(title => {
      var nodes = data.nodes.filter(d => {
        var weight = type.id === 'input' ? d.tmpClickedSourceLink?.weight : d.tmpClickedTargetLink?.weight
        return title == 'Positive' ? weight > 0 : weight < 0
      })
      nodes = d3.sort(nodes, d => -(type.id === 'input' ? d.tmpClickedSourceLink?.pctInput : d.tmpClickedTargetLink?.pctInput))
      return {title, nodes}
    }))

    var typesSel = nodeConnectionsSel.append('div.connections')
      .st({flex: '1 0 auto', display: 'flex', overflow: 'hidden', gap: '20px'})
      .appendMany('div.features', types)
      .classed('output', d => d.id === 'output')
      .classed('input', d => d.id === 'input')

    typesSel.append('div.section-title').text(d => d.title)
      .st({marginBottom: 0})
    // addInputSumTable(typesSel.filter(d => d.id == 'input').append('div.sum-table').append('div.section'))

    var featuresContainerSel = typesSel.append('div.effects')

    var sectionSel = featuresContainerSel.appendMany('div.section', d => d.sections)
    featureSel = sectionSel.appendMany('div.feature-row', d => d.nodes)
      .classed('clicked', e => e.featureId == visState.clickedId)

    classPinned()
    classHidden()

    typesSel.each(function(type) {
      d3.select(this).selectAll('.feature-row')
        .call(utilCg.renderFeatureRow, visState, renderAll, type.id === 'input' ? 'tmpClickedSourceLink' : 'tmpClickedTargetLink')
    })
  }

  function addHeaderRow(headerSel){
    if (!clickedNode) return

    headerSel.append('text')
      .text(clickedNode.feature_type == 'cross layer transcoder' ? 'F#' + d3.format('08')(clickedNode.feature) : ' ')
      .st({display: 'inline-block', marginRight: 5, 'font-variant-numeric': 'tabular-nums', width: 82})
    headerSel.append('span.feature-icon').text(utilCg.featureTypeToText(clickedNode.feature_type))
    headerSel.append('span.feature-title').text(clickedNode.ppClerp)

    // add cmd-click toggle to title
    headerSel.on('click', ev => {
      utilCg.clickFeature(visState, renderAll, clickedNode, ev.metaKey || ev.ctrlKey)

      if (visState.clickedId) return
      // double render to toggle on hoveredId, could expose more of utilCg.clickFeature to prevent
      visState.hoveredId = clickedNode.featureId
      renderAll.hoveredId()
    })
  }

  function addInputSumTable(sumSel){
    return // TODO: turn back on?

    var clickedNode = data.nodes.idToNode[visState.clickedId]
    if (!clickedNode) return
    var inputSum = d3.sum(clickedNode.sourceLinks, d => Math.abs(d.weight))

    var tableSel = sumSel.append('table')
    tableSel.appendMany('th', ['% Feat', '% Err', '% Emb']).text(d => d)

    var trSel = tableSel.appendMany('tr.data', [
      {str: '←', links: clickedNode.sourceLinks.filter(d => d.sourceNode.ctx_idx != clickedNode.ctx_idx)},
      {str: '↓', links: clickedNode.sourceLinks.filter(d => d.sourceNode.ctx_idx == clickedNode.ctx_idx)}
    ])

    trSel.append('td').text(d => d.str).at({title: d => d.str == '↓' ? 'cur token' : 'prev token'})
    trSel.appendMany('td', d => {
        var rv = [
          d.links.filter(e => !e.sourceNode.isError && e.sourceNode.feature_type != 'embedding'),
          d.links.filter(e => e.sourceNode.isError),
          d.links.filter(e => e.sourceNode.feature_type == 'embedding'),
        ]

        if (rv.flat().length != d.links.length) console.error("Non-feature/error/embedding node present")
        return rv
      })
      .html(links => {
        var pos = d3.sum(links.filter(d => d.weight > 0), d => d.weight)/inputSum
        var neg = d3.sum(links.filter(d => d.weight < 0), d => d.weight)/inputSum

        var outStr = `+${d3.format('.2f')(pos)}&#160;&#160;&#160;−${d3.format('.2f')(neg)}`
        return outStr.replaceAll('0.', '.').replaceAll('−−', '−')
      })
  }

  function addAttrContribMaps(d) {
    if (!d || (!d.attr_map && !d.contrib_map)) return

    var mapsSel = nodeConnectionsSel.append('div.attr-contrib-maps')
      .st({fontSize: 12, marginBottom: 12, padding: '0 4px'})

    if (d.attr_map) {
      var tokens = data.metadata.prompt_tokens || []
      var section = mapsSel.append('div').st({marginBottom: 6})
      section.append('div.section-title').text('Input Attribution').st({marginBottom: 4})
      var bars = section.append('div').st({display: 'flex', flexWrap: 'wrap', gap: '1px'})
      var maxVal = Math.max(...d.attr_map.map(Math.abs), 1e-8)
      d.attr_map.forEach((v, i) => {
        var frac = v / maxVal
        var color = frac >= 0
          ? `rgba(37, 99, 235, ${Math.abs(frac).toFixed(2)})`
          : `rgba(220, 38, 38, ${Math.abs(frac).toFixed(2)})`
        bars.append('div')
          .st({
            padding: '1px 3px',
            background: color,
            color: Math.abs(frac) > 0.5 ? '#fff' : '#333',
            borderRadius: 2,
            whiteSpace: 'nowrap',
            cursor: 'default',
          })
          .text(tokens[i] || `[${i}]`)
          .at({title: `${tokens[i] || i}: ${v.toFixed(4)}`})
      })
    }

    if (d.contrib_map) {
      var logitTokens = data.metadata.target_logit_tokens || []
      var section = mapsSel.append('div').st({marginBottom: 6})
      section.append('div.section-title').text('Output Contribution').st({marginBottom: 4})
      var bars = section.append('div').st({display: 'flex', flexWrap: 'wrap', gap: '1px'})
      var maxVal = Math.max(...d.contrib_map.map(Math.abs), 1e-8)
      d.contrib_map.forEach((v, i) => {
        var frac = v / maxVal
        var color = frac >= 0
          ? `rgba(37, 99, 235, ${Math.abs(frac).toFixed(2)})`
          : `rgba(220, 38, 38, ${Math.abs(frac).toFixed(2)})`
        bars.append('div')
          .st({
            padding: '1px 3px',
            background: color,
            color: Math.abs(frac) > 0.5 ? '#fff' : '#333',
            borderRadius: 2,
            whiteSpace: 'nowrap',
            cursor: 'default',
          })
          .text(logitTokens[i] || `logit[${i}]`)
          .at({title: `${logitTokens[i] || i}: ${v.toFixed(4)}`})
      })
    }
  }

  renderAll.hClerpUpdate.fns.push(render)
  renderAll.hoveredId.fns['nodeconnections'] = () => featureSel?.classed('hovered', e => e.featureId == visState.hoveredId)
  renderAll.pinnedIds.fns['nodeconnections'] = classPinned
  renderAll.hiddenIds.fns['nodeconnections'] = classHidden
  renderAll.clickedId.fns['nodeconnections'] = render


  function classPinned(){
    var pinnedIdSet = new Set(visState.pinnedIds)
    featureSel?.classed('pinned', d => pinnedIdSet.has(d.nodeId))
    headerSel?.classed('pinned', d => d && d.nodeId && visState.pinnedIds.includes(d.nodeId))
      .select('span.feature-title').text(d => d.ppClerp)
  }

  function classHidden(){
    var hiddenIdSet = new Set(visState.hiddenIds)
    featureSel?.classed('hidden', d => hiddenIdSet.has(d.featureId))
  }
}

window.init?.()

<script>
window.initCgClerpList = function({visState, renderAll, data, cgSel}){
  let itemSel, weightValSel;
  let clerpListSel = cgSel.select('.clerp-list');

  const tokenValues = data.metadata.prompt_tokens;
  const featureById = d3.group(data.features, d => d.featureId);

  function render() {
    let nodesByTokenByLayer =  d3.group(data.nodes, d => d.ctx_idx, d => d.streamIdx);

    const finalData = Array.from(nodesByTokenByLayer.entries())
      .sort((a, b) => a[0] - b[0])
      .map(d => {
        const layers = Array.from(d[1])
        return {
          token: tokenValues[d[0]],
          values: layers.sort((a, b) => a[0] - b[0]),
        }
      })

    clerpListSel.html('')
      .st({ padding: '2px' });

    const featuresSel = clerpListSel.append('div.features')
      .st({columns: '220px', columnFill: 'auto', height: '100%'});

    const tokenSel = featuresSel.appendMany('div.token', finalData)
      .st({
        position: 'relative',
        borderTop: 'solid 1px hsl(0 0 0 / 0.4)',
      })
      .at({ title: d => d.token });

    const tokenLabelSel = tokenSel.append('div')
      .st({
        fontSize: 11,
        color: 'hsl(0 0 0 /0.4)',
        fontWeight: '400',
        pointerEvents: 'none',
        padding: '2px',
        zIndex: 1e6,
        textWrap: 'nowrap',
        overflow: 'hidden',
        textOverflow: 'ellipsis',
        textAlign: 'center',
        marginTop: 5,
      });

    tokenLabelSel.append('span').text('“');
    tokenLabelSel.append('span')
      .text(d => util.ppToken(d.token))
      .st({
        background: 'hsl(55deg 0% 85% / 0.6)',
        borderRadius: 4,
        padding: '0 2px',
        color: 'black',
        fontWeight: '700',
      });
    tokenLabelSel.append('span').text('”');

    const layerSel = tokenSel
      .appendMany('div.layer', d => d.values)
      .st({ position: 'relative' });

    const nodeSel = layerSel.appendMany('div.node', d => d[1].entries().map(d => d[1]));

    itemSel = nodeSel.append('div.feature-row')
      .classed('clicked', e => e.nodeId == visState.clickedId)
      .classed('pinned', d => visState.pinnedIds.includes(d.nodeId));

    utilCg.renderFeatureRow(itemSel, visState, renderAll);

  }
  renderAll.hClerpUpdate.fns.push(render);
  renderAll.clickedId.fns.push(render);
  renderAll.hoveredId.fns.push(() => itemSel?.classed('hovered', e => e.featureId == visState.hoveredId));
  renderAll.pinnedIds.fns.push(() => itemSel?.classed('pinned', d => visState.pinnedIds.includes(d.nodeId)));

  renderAll.clickedId.fns.push(() => {
    if (!itemSel || visState.isDev) return

    var hNode = itemSel.filter(d => d.featureId == visState.clickedId).node()
    if (!hNode) return
    var cNode = clerpListSel.node()

    var scrollTop = hNode.offsetTop - cNode.offsetTop - cNode.clientHeight / 2 + hNode.clientHeight / 2
    scrollTop = d3.clamp(0, scrollTop, cNode.scrollHeight - cNode.clientHeight)
    if (scrollTop < cNode.scrollTop - cNode.clientHeight / 2 || scrollTop > cNode.scrollTop + cNode.clientHeight / 2) {
      cNode.scrollTop = scrollTop;
    }
  });

}

window.init?.()

<script>
window.initCgFeatureDetail = async function({visState, renderAll, data, cgSel}){
  var sel = cgSel.select('.feature-detail').html('')
  if (!sel.node()) return

  var headerSel = sel.append('div.feature-header')
  var logitsSel = sel.append('div.logits-container')
  var examplesSel = sel.append('div.feature-examples-container')
  var featureExamples = await window.initFeatureExamples({
    containerSel: examplesSel,
    showLogits: true,
    // showLogits: !data.nodes.some(d => d.top_logit_effects) // we show logits ourselves frozen above the feature vis, don't also show it inside
  })

  let editOpen = false;

  // throttle to prevent lag when mousing over
  var renderFeatureExamples = util.throttleDebounce(featureExamples.renderFeature, 200)

  function renderFeatureDetail() {
    logitsSel.html('').st({display:''})

    // display hovered then clicked nodes, with fallbacks for supernode
    var d = data.nodes.find(e => e.nodeId === visState.hoveredNodeId)
    if (!d) d = data.nodes.find(e => e.nodeId === visState.clickedId)
    if (!d){
      var featureId = visState.hoveredId
      if (!featureId || featureId.includes('supernode')){
        headerSel.html('')
          .append('div.no-selected-feature').text("Click or hover to see a feature's examples")
        examplesSel.st({opacity: 0})
        return
      }
      return
    }

    if (visState.graphSchemaVersion > 0) {
      var [layerIdx, featIdx] = util.cantorUnpair(d.featureIndex)
    } else {
      var featIdx = d.featureIndex
    }

    var label = d.isTmpFeature ? d.featureId :
      visState.isHideLayer ? `#F${d.featureIndex}` :
      `${utilCg.layerLocationLabel(d.layer, d.probe_location_idx)}/${featIdx}`

    if (d.isError || d.feature_type == 'embedding' || d.feature_type == 'logit'){
      if (d.isError) addLogits(d)
      if (d.feature_type=='logit') addEmbeddings(d)

      headerSel.html('').append('div.header-top-row').append('div.feature-title')
        .text(d.ppClerp)
      examplesSel.st({opacity: 0})
    } else if (d.feature_type == 'cross layer transcoder') {
      const scan = data.metadata.scan?.startsWith('custom-') ? data.metadata.transcoder_list[d.layer] : data.metadata.scan;
      addLogits(d)
      addEmbeddings(d)
      var headerTopRowSel = headerSel.html('').append('div.header-top-row')

      const currentActivation = d.activation

      const actText = typeof currentActivation == 'number' ? currentActivation.toFixed(2) : 'N/A'
      const featureTitleSel = headerTopRowSel.append('div.feature-title')
        .html(`Feature&nbsp;<a style="color: inherit;" href="${d.url}" target="_blank">${label}</a> <span style="font-size: 0.9em; color: #777;">Act: ${actText}</span>`)

      if (typeof currentActivation == 'number' && scan && scan.includes('//')) {
        window.renderActHistogram({
          featureTitleSel,
          scan,
          featureNode: d,
          featureExamples,
        })
      }

      headerTopRowSel.append('div.pp-clerp')
        .text(d.ppClerp)
        .at({title: d.ppClerp})

      if (visState.isEditMode){
        headerTopRowSel.append('button.edit-clerp-button')
          .text('Edit')
          .on('click', toggleEdit)

        function toggleEdit() {
          editOpen = !editOpen;
          hClerpEditSel.st({display: editOpen ? 'flex' : 'none'})
          if (editOpen) {
            headerSel.select('input').node()?.focus();
          }
        }

        const hClerpEditSel = headerSel.append('div.clerp-edit')
          .st({ display: editOpen ? 'flex' : 'none' });

        const hClerpSel = hClerpEditSel.append('div')
          .st({ display: 'flex' });
        hClerpSel.append('div')
          .st({flex: '0 0 50px'})
          .text(`🧑💻`);
        hClerpSel.append('input').data([d])
          .at({ value: d.localClerp })
          .st({flex: '1 0 0', whiteSpace: 'normal', fontSize: 12})
          .on('change', ev => {
            renderAll.hClerpUpdate([d, ev.target.value]);
          })

        // const rClerpSel = hClerpEditSel.append('div')
        //     .st({ display: 'flex' });
        //   rClerpSel.append('div')
        //     .st({flex: '0 0 50px'})
        //     .text(`🧑☁️`);
        //   rClerpSel.append('div')
        //     .text(d.remoteClerp)
        //     .st({flex: '1 0', whiteSpace: 'normal'})

        // const clerpSel = hClerpEditSel.append('div')
        //   .st({ display: 'flex' });
        // clerpSel.append('div')
        //   .st({flex: '0 0 50px'})
        //   .text(`🤖💬`);
        // clerpSel.append('div')
        //   .text(d.clerp)
        //   .st({ flex: '1 0', whiteSpace: 'normal' })
      }

      // Show cached exemplars immediately, otherwise show a load button
      examplesSel.st({opacity: 1})
      examplesSel.selectAll('.load-exemplars-btn').remove()
      var sign = (typeof d.activation == 'number' && d.activation < 0) ? '-' : '+'
      if (featureExamples.isCached(d.featureIndex, sign)) {
        renderFeatureExamples(scan, d.featureIndex, undefined, sign)
      } else {
        featureExamples.clearExamples()
        examplesSel.insert('button', ':first-child')
          .attr('class', 'load-exemplars-btn')
          .text('Load exemplars')
          .st({margin: '8px', padding: '4px 12px', cursor: 'pointer'})
          .on('click', function() {
            d3.select(this).text('Loading...').attr('disabled', true)
            var btn = d3.select(this)
            renderFeatureExamples(scan, d.featureIndex, undefined, sign).then(() => btn.remove())
          })
      }
    } else {
      headerSel.html(`<b>${label}</b>`)
      logitsSel.html('No logit data')
      examplesSel.st({opacity: 0})
    }

    // add pinned/click state and toggle to feature-title
    headerSel.select('div.feature-title')
      .classed('pinned', d.nodeId && visState.pinnedIds.includes(d.nodeId))
      .classed('hovered', visState.clickedId == d.nodeId)
      .on('click', ev => {
        utilCg.clickFeature(visState, renderAll, d, ev.metaKey || ev.ctrlKey)

        if (visState.clickedId) return
        // double render to toggle on hoveredId, could expose more of utilCg.clickFeature to prevent
        visState.hoveredId = d.featureId
        renderAll.hoveredId()
      })

  }

  function addLogits(d) {
    // return
    if (!d || !d.top_logit_effects) return logitsSel.html('').st({display: 'none'})
    // Add logit effects section
    let logitRowContainerSel = logitsSel.st({display: ''})
      .append('div.effects')
      .appendMany('div.sign', [d.top_logit_effects, d.bottom_logit_effects].filter(d => d))
    logitRowContainerSel.append('div.label').text((d, i) => i ? 'Bottom Outputs' : 'Top Outputs')
    logitRowContainerSel.append('div.rows')
      .appendMany('div.row', d => d)
      .append('span.key').text(d => d)
  }
  function addEmbeddings(d) {
    // return
    // Add embedding effects section
    if (d.top_embedding_effects || d.bottom_embedding_effects) {
      let embeddingRowContainerSel = logitsSel
        .append('div.effects')
        .appendMany('div.sign', [d.top_embedding_effects, d.bottom_embedding_effects].filter(d => d))
      embeddingRowContainerSel.append('div.label').text((d, i) => i ? 'Bottom Inputs' : 'Top Inputs')
      embeddingRowContainerSel.append('div.rows').appendMany('div.row', d => d)
        .append('span.key').text(d => d)
    }
  }

  function addAttrContribMaps(d) {
    if (!d.attr_map && !d.contrib_map) return

    var mapsSel = logitsSel.append('div.attr-contrib-maps')
      .st({marginTop: 6, fontSize: 12})

    if (d.attr_map) {
      var tokens = data.metadata.prompt_tokens || []
      // Align attr_map to suffix of prompt_tokens when lengths differ
      var offset = tokens.length - d.attr_map.length
      var section = mapsSel.append('div').st({marginBottom: 8})
      section.append('div').st({fontWeight: 'bold', marginBottom: 2}).text('Input Attribution (attr_map)')
      var bars = section.append('div').st({display: 'flex', flexWrap: 'wrap', gap: '1px'})
      var maxVal = Math.max(...d.attr_map.map(Math.abs), 1e-8)
      d.attr_map.forEach((v, i) => {
        var tokenIdx = i + Math.max(0, offset)
        var frac = v / maxVal
        var color = frac >= 0
          ? `rgba(37, 99, 235, ${Math.abs(frac).toFixed(2)})`
          : `rgba(220, 38, 38, ${Math.abs(frac).toFixed(2)})`
        bars.append('div')
          .st({
            padding: '1px 3px',
            background: color,
            color: Math.abs(frac) > 0.5 ? '#fff' : '#333',
            borderRadius: 2,
            whiteSpace: 'nowrap',
            cursor: 'default',
          })
          .text(tokens[tokenIdx] || `[${i}]`)
          .at({title: `${tokens[tokenIdx] || i}: ${v.toFixed(4)}`})
      })
    }

    if (d.contrib_map) {
      var logitTokens = data.metadata.target_logit_tokens || []
      var section = mapsSel.append('div').st({marginBottom: 8})
      section.append('div').st({fontWeight: 'bold', marginBottom: 2}).text('Output Contribution (contrib_map)')
      var bars = section.append('div').st({display: 'flex', flexWrap: 'wrap', gap: '1px'})
      var maxVal = Math.max(...d.contrib_map.map(Math.abs), 1e-8)
      d.contrib_map.forEach((v, i) => {
        var frac = v / maxVal
        var color = frac >= 0
          ? `rgba(37, 99, 235, ${Math.abs(frac).toFixed(2)})`
          : `rgba(220, 38, 38, ${Math.abs(frac).toFixed(2)})`
        bars.append('div')
          .st({
            padding: '1px 3px',
            background: color,
            color: Math.abs(frac) > 0.5 ? '#fff' : '#333',
            borderRadius: 2,
            whiteSpace: 'nowrap',
            cursor: 'default',
          })
          .text(logitTokens[i] || `logit[${i}]`)
          .at({title: `${logitTokens[i] || i}: ${v.toFixed(4)}`})
      })
    }
  }

  renderAll.hClerpUpdate.fns.push(renderFeatureDetail)
  renderAll.clickedId.fns.push(renderFeatureDetail)
  renderAll.hoveredId.fns.push(renderFeatureDetail)
  renderAll.pinnedIds.fns.push(renderFeatureDetail)

  renderFeatureDetail()
}

window.init?.()

</script>

window.initCgFeatureScatter = function({visState, renderAll, data, cgSel}){
  var nodes = data.nodes//.filter(d => !d.isLogit)

  var numericCols = Object.entries(nodes[0])
    .filter(([k, v]) => typeof v != 'object' && typeof v != 'function' && !utilCg.keysToSkip.has(k) && isFinite(v))
    .map(([k]) => k)

  var xKey = util.params.get('feature_scatter_x') || 'ctx_idx'
  var yKey = util.params.get('feature_scatter_y') || 'target_influence'
  function addSelect(isX){
    var options = isX ? ['Distribution'].concat(numericCols) : numericCols
    selectSel.append('select').st({marginRight: 10})
      .on('change', function(){
        isX ? xKey = options[this.selectedIndex] : yKey = options[this.selectedIndex]
        isX ? util.params.set('feature_scatter_x', xKey) : util.params.set('feature_scatter_y', yKey)
        renderScales()
      })
      .appendMany('option', options)
      .text(d => d)
      .at({value: d => d})
      .filter(d => isX && d == xKey || !isX && d == yKey).at({selected: 'selected'})
  }

  var sel = cgSel.select('.feature-scatter').html('')
  var selectSel = sel.append('div.select-container').st({marginLeft: 35})
  var chartSel = sel.append('div.chart-container')
  addSelect(1)
  addSelect(0)

  function renderScales(){
    var c = d3.conventions({
      sel: chartSel.html('').append('div'),
      margin: {left: 35, bottom: 30, top: 2, right: 6},
    })

    if (xKey == 'Distribution'){
      d3.sort(d3.sort(nodes, d => +d[yKey]), d => d.feature_type)
        .forEach((d, i) => d.Distribution = i/nodes.length)
    }

    c.x.domain(d3.extent(nodes, d => +d[xKey])).nice()
    c.y.domain(d3.extent(nodes, d => +d[yKey])).nice()

    c.yAxis.ticks(3)
    c.xAxis.ticks(5)
    c.drawAxis()
    util.ggPlot(c)
    util.addAxisLabel(c, xKey + ' →', yKey + ' →', '', 0, 5)

    var nodeSel = c.svg.appendMany('text.node', nodes)
      .translate(d => [c.x(d[xKey]) ?? -2, c.y(d[yKey]) ?? c.height + 2])
      .text(d => utilCg.featureTypeToText(d.feature_type))
      .at({
        fontSize: 7,
        stroke: '#000',
        strokeWidth: .2,
        textAnchor: 'middle',
        dominantBaseline: 'central',
        fill: 'rgba(0,0,0,.1)'
      })
      .call(utilCg.addFeatureTooltip)
      .call(utilCg.addFeatureEvents(visState, renderAll))

    // TODO: add hover circle?
    utilCg.updateFeatureStyles(nodeSel)
    renderAll.hoveredId.fns['featureScatter'] = () => utilCg.updateFeatureStyles(nodeSel)
    renderAll.clickedId.fns['featureScatter'] = () => utilCg.updateFeatureStyles(nodeSel)
    renderAll.pinnedIds.fns['featureScatter'] = () => utilCg.updateFeatureStyles(nodeSel)
    renderAll.hiddenIds.fns['featureScatter'] = () => utilCg.updateFeatureStyles(nodeSel)
  }

  // TODO: awkward, maybe gridsnap/widget inits need to be restructured?
  if (!sel.datum().resizeFn) renderScales()
  sel.datum().resizeFn = renderScales
}

window.init?.()

<script>
window.initCgSubgraph = function ({visState, renderAll, data, cgSel}) {
  var subgraphSel = cgSel.select('.subgraph')
  subgraphSel.datum().resizeFn = renderSubgraph

  var nodeIdToNode = {}
  var sgNodes = []
  var sgLinks = []

  let nodeSel = null
  let memberNodeSel = null
  let simulation = null

  var nodeWidth = 75
  var nodeHeight = 25

  function supernodesToUrl() {
    util.params.set('supernodes', JSON.stringify(subgraphState.supernodes))
  }

  var subgraphState = visState.subgraph = visState.subgraph || {
    sticky: true,
    dagrefy: true,
    supernodes: visState.supernodes || [],
    activeGrouping: {
      isActive: false,
      selectedNodeIds: new Set(),
      isDragging: false,
    }
  }

  d3.select('body')
    .on('keydown.grouping' + data.metadata.slug, ev => {
      if (ev.repeat) return
      if (!visState.isEditMode || ev.key != 'g') return
      subgraphState.activeGrouping.isActive = true
      styleNodes()

      subgraphSel.classed('is-grouping', true)
    })
    .on('keyup.grouping' + data.metadata.slug, ev => {
      if (!visState.isEditMode || ev.key != 'g') return
      if (subgraphState.activeGrouping.selectedNodeIds.size > 1){
        var allSelectedIds = []
        var prevSupernodeLabel = ''
        subgraphState.activeGrouping.selectedNodeIds.forEach(id => {
          var node = nodeIdToNode[id]
          if (!node?.memberNodeIds) return allSelectedIds.push(id)
          prevSupernodeLabel = node.ppClerp

          // if a supernode is selected, remove the previous super node
          subgraphState.supernodes = subgraphState.supernodes.filter(([label, ...nodeIds]) =>
            !nodeIds.every(d => node.memberNodeIds.includes(d))
          )
          // and adds its member nodes to selection
          node.memberNodeIds.forEach(id => allSelectedIds.push(id))
        })

        var label = prevSupernodeLabel || allSelectedIds
          .map(id => nodeIdToNode[id]?.ppClerp)
          .find(d => d) || 'supernode'
        subgraphState.supernodes.push([label, ...new Set(allSelectedIds)])
        supernodesToUrl()
      }
      subgraphState.activeGrouping.isActive = false
      subgraphState.activeGrouping.selectedNodeIds.clear()
      renderSubgraph()

      subgraphSel.classed('is-grouping', false)
    })

  let {nodes, links} = data

  function renderSubgraph() {
    var c = d3.conventions({
      sel: subgraphSel.html(''),
      margin: {top: 26, bottom: 5, left: visState.isHideLayer ? 0 : 30},
      layers: 'sd',
    })
    // subgraphSel.st({borderTop: '1px solid #eee'})

    c.svg.append('text.section-title').text('Subgraph').translate(-16, 1)
    c.svg.append('g.border-path').append('path')
      .at({stroke: '#eee', d: 'M 0 -10 H ' + c.width})


    var [svg, div] = c.layers

    // // set up arrowheads
    // svg.appendMany('marker', [{id: 'mid-negative', color: '#40004b'},{id: 'mid-positive', color: '#00441b'}])
    //   .at({id: d => d.id, orient: 'auto', refX: .1, refY: 1}) // marker-height/marker-width?
    //   .append('path')
    //   .at({d: 'M0,0 V2 L1,1 Z', fill: d => d.color})


    // pick out the subgraph and do supernode surgery
    nodes.forEach(d => d.supernodeId = null)
    var pinnedIds = visState.pinnedIds.slice(0, 200) // max of 200 nodes
    var pinnedNodes = nodes.filter(d => pinnedIds.includes(d.nodeId))
    console.log('pinnedIds:', pinnedIds.length, 'pinnedNodes:', pinnedNodes.length, 'emb pinned:', pinnedNodes.filter(d => d.feature_type === 'embedding').length, 'supernodes:', subgraphState.supernodes.length)

    // create supernodes and mark their children
    nodeIdToNode = Object.fromEntries(pinnedNodes.map(d => [d.nodeId, d]))
    var supernodes = subgraphState.supernodes
      .map(([label, ...nodeIds], i) => {
        var nodeId = nodeIdToNode[label] ? `supernode-${i}` : label
        var memberNodes = nodeIds.map(id => nodeIdToNode[id]).filter(d => d)
        memberNodes.forEach(d => d.supernodeId = nodeId)

        var rv = {
          nodeId,
          featureId: `supernode-${i}`,
          ppClerp: label,
          layer: d3.mean(memberNodes, d => +d.layer),
          ctx_idx: d3.mean(memberNodes, d => d.ctx_idx),
          ppLayer: d3.extent(memberNodes, d => +d.layer).join('—'),
          streamIdx: d3.mean(memberNodes, d => d.streamIdx),
          memberNodeIds: nodeIds,
          memberNodes,
          isSuperNode: true,
        }
        nodeIdToNode[rv.nodeId] = rv

        return rv
      })
      .filter(d => d.memberNodes.length)

    // update clerps — fragile hack if hClerpUpdate changes
    // nodes.forEach(d => d.ppClerp = d.localClerp || d.clerp)
    supernodes.forEach(({ppClerp, memberNodes}) => {
      if (memberNodes.length == 1 && ppClerp == memberNodes[0].ppClerp) return

      memberNodes.forEach(d => {
        const nodeClerp = d.localClerp || d.clerp
        d.ppClerp = `[${ppClerp}]` + (ppClerp != nodeClerp ? ' ' + nodeClerp : '')
      })
    })

    // inputAbsSumExternalSn: the abs sum of input links from outside the supernode
    pinnedNodes.forEach(d => {
      d.inputAbsSumExternalSn = d3.sum(d.sourceLinks, e => {
        if (!e.sourceNode.supernodeId) return Math.abs(e.weight)
        return e.sourceNode.supernodeId == d.supernodeId ? 0 : Math.abs(e.weight)
      })
      d.sgSnInputWeighting = d.inputAbsSumExternalSn/d.inputAbsSum
    })

    // subgraph plots pinnedNodes not in a supernode and supernodes
    sgNodes = pinnedNodes.filter(d => !d.supernodeId).concat(supernodes)
    sgNodes.forEach(d => {
      // for supernodes, sum up values from member nodes
      if (d.isSuperNode) {
        d.inputAbsSum = d3.sum(d.memberNodes, e => e.inputAbsSum)
        d.inputAbsSumExternalSn = d3.sum(d.memberNodes, e => e.inputAbsSumExternalSn)
      } else {
        d.memberNodes = [d]
      }

      var sum = d3.sum(d.memberNodes, e => e.sgSnInputWeighting)
      d.memberNodes.forEach(e => e.sgSnInputWeighting = e.sgSnInputWeighting/sum)
    })

    // select subgraph links
    sgLinks = links
      .filter(d => nodeIdToNode[d.sourceNode.nodeId] && nodeIdToNode[d.targetNode.nodeId])
      .map(d => ({
        source: d.sourceNode.nodeId,
        target: d.targetNode.nodeId,
        weight: d.weight,
        color: d.pctInputColor,
        ogLink: d,
      }))

    // then remap source/target to supernodes
    sgLinks.forEach(link => {
      if (nodeIdToNode[link.source]?.supernodeId) link.source = nodeIdToNode[link.source].supernodeId
      if (nodeIdToNode[link.target]?.supernodeId) link.target = nodeIdToNode[link.target].supernodeId
    })

    // finally combine parallel links and remove self-links
    sgLinks = d3.nestBy(sgLinks, d => d.source + '-' + d.target)
      .map(links => {
        var weight = d3.sum(links, link => {
          var {inputAbsSumExternalSn, sgSnInputWeighting} = link.ogLink.targetNode
          return link.weight/inputAbsSumExternalSn*sgSnInputWeighting
        })

        return {
          source: links[0].source,
          target: links[0].target,
          weight,
          color: utilCg.pctInputColorFn(weight),
          pctInput: weight,
          pctInputColor: utilCg.pctInputColorFn(weight),
          ogLinks: links
        }
      })
      .filter(d => d.source !== d.target)
    sgLinks = d3.sort(sgLinks, d => Math.abs(d.weight))

    let xScale = d3.scaleLinear()
      .domain(d3.extent(sgNodes.map(d => d.ctx_idx)))
      .range([0, c.width*3/4])
    let yScale = d3.scaleLinear()
      .domain(d3.extent(sgNodes.map(d => d.streamIdx)).toReversed())
      .range([0, c.height - nodeHeight])

    // d3.force is impure, need copy
    // Also want to persist these positions across node changes
    const existingNodes = window.selForceNodes && new Map(window.selForceNodes.map(n => [n.node.nodeId, n]))
    window.selForceNodes = sgNodes.map(node => {
      const existing = existingNodes?.get(node.nodeId)
      return {
        x: existing ? existing.x : xScale(node.ctx_idx),
        y: existing ? existing.y : yScale(node.streamIdx),
        fx: existing?.fx,
        fy: existing?.fy,
        nodeId: node.nodeId, // for addFeatureEvents
        featureId: node.featureId, // for addFeatureEvents
        node,
        sortedSlug: d3.sort(node.memberNodes.map(d => d.featureIndex).join(' ')),
      }
    })


    var selForceNodes = window.selForceNodes = d3.sort(window.selForceNodes, d => d.sortedSlug)
    window._exportSubgraphPos = function(){
      return selForceNodes.map(d => [d.x/c.width*1000, d.y/c.height*1000].map(Math.round)).flat().join(' ')
    }

    if (simulation) simulation.stop()
    simulation = d3.forceSimulation(selForceNodes)
      .force('link', d3.forceLink(sgLinks).id(d => d.node.nodeId))
      .force('charge', d3.forceManyBody())
      .force('collide', d3.forceCollide(Math.sqrt(nodeHeight ** 2 + nodeWidth ** 2) / 2))
      .force('container', forceContainer([[-10, 0], [c.width - nodeHeight, c.height - nodeHeight]]))
      .force('x', d3.forceX(d => xScale(d.node.ctx_idx)).strength(.1))
      .force('y', d3.forceY(d => yScale(d.node.streamIdx)).strength(2))

    var svgPaths = svg.appendMany('path.link-path', sgLinks).at({
      fill: 'none',
      markerMid: d => d.weight > 0 ? 'url(#mid-positive)' : 'url(#mid-negative)',
      strokeWidth: d => Math.abs(d.weight)*15,
      stroke: d => d.color,
      opacity: 0.8,
      strokeLinecap: 'round',
    })

    var edgeLabels = svg.appendMany('text.weight-label', sgLinks)
      // .text(d => d3.format('+.2f')(d.weight))

    simulation.on('tick', renderForce)

    var drag = d3.drag()
      .on('drag', (ev) => {
        // Only when actually dragging, mark as no longer dagre positioned and restart sim
        visState.subgraph.activeGrouping.isDragging = true
        ev.subject.dagrePositioned = false
        if (!ev.active) simulation.alphaTarget(0.3).restart()
        ev.subject.fx = ev.subject.x = ev.x
        ev.subject.fy = ev.subject.y = ev.y
        renderForce()
      })
      .on('end', (ev) => {
        visState.subgraph.activeGrouping.isDragging = false
        if (!ev.active) simulation.alphaTarget(0)
        if (!subgraphState.sticky && !ev.subject.dagrePositioned){
          ev.subject.fx = null
          ev.subject.fy = null
        }
      })

    nodeSel = div
      .appendMany('div.supernode-container', selForceNodes)
      .translate(d => [d.x, d.y])
      .st({width: nodeWidth, height: nodeHeight})
      .call(utilCg.addFeatureEvents(visState, renderAll, ev => ev.shiftKey))
      .on('click.group', (ev, d) => {
        var {isActive, selectedNodeIds} = subgraphState.activeGrouping
        if (!isActive) return

        // If it's a child node, use its parent supernode's ID instead
        var nodeId = d.supernodeId || d.nodeId
        selectedNodeIds.has(nodeId) ? selectedNodeIds.delete(nodeId) : selectedNodeIds.add(nodeId)

        styleNodes()
        ev.stopPropagation()
        ev.preventDefault()
      })
      .call(drag)

    selForceNodes.forEach(d => {
      if (!d.node.memberNodes) d.node.memberNodes = [d.node]
    })

    var supernodeSel = nodeSel//.filter(d => d.node.isSuperNode)
      .classed('is-supernode', true)
      .st({height: nodeHeight + 12})

    memberNodeSel = supernodeSel.append('div.member-circles')
      .st({
        width: d => d.node.memberNodes.length <= 4 ? 'auto' : 'calc(32px + 12px)',
        gap: d => d.node.memberNodes.length <= 4 ? 4 : 0,
      })
      .appendMany('div.member-circle', d => d.node.memberNodes)
      .classed('not-clt-feature', d => d.feature_type != 'cross layer transcoder')
      .st({marginLeft: function(d, i) {
          var n = this.parentNode.childNodes.length
          return n <= 4 ? 0 : i == 0 ? 0 : -((n - 4)*8)/(n - 1)
      }})
      .call(utilCg.addFeatureEvents(visState, renderAll, ev => ev.shiftKey))
      .on('click.stop-parent', ev => {
        if (!subgraphState.activeGrouping.isActive) ev.stopPropagation()
      })
      .on('mouseover.stop-parent', ev => ev.stopPropagation())
      .at({title: d => d.ppClerp})

    if (visState.isEditMode) {
      // TODO: enable
      supernodeSel.select('.member-circles')
        .filter(d => d.node.isSuperNode)
        .append('div.ungroup-btn')
        .text('×').st({top: 2, left: -15, position: 'absolute'})
        .on('click', (ev, d) => {
          ev.stopPropagation()

          subgraphState.supernodes = subgraphState.supernodes.filter(([label, ...nodeIds]) =>
            !nodeIds.every(id => d.node.memberNodeIds.includes(id))
          )
          supernodesToUrl()
          renderSubgraph()
        })
    }

    var nodeTextSel = nodeSel.append('div.node-text-container')
    nodeTextSel.append('span')
      .text(d => d.node.ppClerp)
      .on('click', (ev, d) => {
        if (!visState.isEditMode) return
        if (!d.node.isSuperNode) return
        // TODO: enable?
        // return
        ev.stopPropagation()

        var spanSel = d3.select(ev.target).st({display: 'none'})
        var input = d3.select(spanSel.node().parentNode).append('input')
          .at({class: 'temp-edit', value: spanSel.text()})
          .on('blur', save)
          .on('keydown', ev => {
            if (ev.key === 'Enter'){
              save()
              input.node().blur()
            }
            ev.stopPropagation()
          })

        input.node().focus()

        function save(){
          var idx = subgraphState.supernodes.findIndex(([label, ...nodeIds]) =>
            nodeIds.every(id => d.node.memberNodeIds.includes(id))
          )
          if (idx >= 0){
            subgraphState.supernodes[idx][0] = input.node().value || 'supernode'
            supernodesToUrl()
            renderSubgraph()
          }
        }
      })


    nodeTextSel.each(function(d) {
      d.textHeight = this.getBoundingClientRect().height || -8
    })

    nodeSel.append('div.clicked-weight.source')
    nodeSel.append('div.clicked-weight.target')
    styleNodes()


    var checkboxes = Object.entries({
      sticky: () => {
        // simulation.alphaTarget(0.3).restart()
        if (!subgraphState.sticky) unsticky()
      },
      dagrefy: () => {
        subgraphState.dagrefy ? dagrefy() : selForceNodes.forEach(d => d.dagrePositioned = null)
      },
    }).map(([key, fn]) => ({key, fn}))


    if (visState.isEditMode) {
      div.append('div.checkbox-container').translate([-c.margin.left, c.margin.bottom])
        .appendMany('label', checkboxes).append('input')
        .at({type: 'checkbox'})
        .property('checked', d => subgraphState[d.key])
        .on('change', function(ev, d){
          subgraphState[d.key] = this.checked
          d.fn()
        })
        .parent().append('span').text(d => d.key)
    }

    checkboxes.forEach(d => d.fn())

    function unsticky(){
      selForceNodes.forEach(d => (d.fx = d.fy = null))
      simulation.alphaTarget(0.3).restart()
      if (subgraphState.dagrefy) {
        subgraphState.dagrefy = false
        d3.select('.checkbox-container').selectAll('input').filter(d => d.key == 'dagrefy').property('checked', 0)
        checkboxes.find(d => d.key == 'dagrefy').fn()
      }
    }

    function dagrefy(){
      if (visState.sg_pos){
        var nums = visState.sg_pos.split(' ').map(d => +d)
        selForceNodes.forEach((d, i) => {
          d.fx = d.x = nums[i*2 + 0]/1000*c.width
          d.fy = d.y = nums[i*2 + 1]/1000*c.height
        })

        nodeSel.translate(d => [d.x, d.y])
        styleNodes()
        renderEdges()

        visState.og_sg_pos = visState.sg_pos
        delete visState.sg_pos
      }
      if (visState.og_sg_pos) return


      var g = new window.dagre.graphlib.Graph()
      g.setGraph({rankdir: 'BT', nodesep: 20, ranksep: 20})
      g.setDefaultEdgeLabel(() => ({}))

      sgLinks.forEach(d =>{
        if (Math.abs(d.weight) < .003) return
        // set width and height to make dagre return x and y for edges
        g.setEdge(d.source.nodeId, d.target.nodeId, {width: 1, height: 1, labelpos: 'c', weight: Math.abs(d.weight)})
      })
      sgNodes.forEach(d => {
        g.setNode(d.nodeId, {width: nodeWidth, height: nodeHeight})
      })

      window.dagre.layout(g)

      // rescale to fit container
      var xs = d3.scaleLinear([0, g.graph().width], [0, Math.min(c.width, g.graph().width)])
      var ys = d3.scaleLinear([0, g.graph().height], [0, Math.min(c.height, g.graph().height)])

      // flip to make ctx_idx left to right and streamIdx bottom to top
      var w0 = d3.mean(selForceNodes, d =>  g.node(d.nodeId).x*d.node.ctx_idx)
      var w1 = d3.mean(selForceNodes, d => -g.node(d.nodeId).x*d.node.ctx_idx)
      if (w0 < w1) xs.range(xs.range().reverse())

      var w0 = d3.mean(selForceNodes, d => g.node(d.nodeId).y*d.node.streamIdx)
      var w1 = d3.mean(selForceNodes, d => -g.node(d.nodeId).y*d.node.streamIdx)
      if (w0 < w1) ys.range(ys.range().reverse())

      for (var node of window.selForceNodes) {
        var pos = g.node(node.nodeId)
        node.fx = node.x = xs(pos.x) - nodeWidth/2
        node.fy = node.y = ys(pos.y) - nodeHeight/2
        node.dagrePositioned = true
      }

      // var curveFactory = d3.line(d => d.x, d => d.y).curve(d3.curveBasis)
      // svgPaths.at({d: d => {
      //   var points = g.edge(d.source.nodeId, d.target.nodeId)?.points
      //   if (!points) return ''
      //   return curveFactory(points.map(p => ({x: xs(p.x), y: ys(p.y)})))
      // }})
      renderEdges()

      // edgeLabels.translate(d => {
      //   var pos = g.edge(d.source.nodeId, d.target.nodeId)
      //   if (!pos) return [-100, -100]
      //   return [xs(pos.x), ys(pos.y)]
      // })
      styleNodes()
    }

    function renderForce(){
      nodeSel.translate(d => [d.x, d.y])

      renderEdges()

      edgeLabels
        .filter(d => !(d.source.dagrePositioned && d.target.dagrePositioned))
        .translate(d => [
          (d.source.x + d.target.x) / 2 + nodeWidth / 2,
          (d.source.y + d.target.y) / 2 + nodeHeight / 2
        ])
    }

    function renderEdges(){

      // TODO: use actual strokeWidth to spread
      d3.nestBy(sgLinks, d => d.source).forEach(links => {
        // if (links[0].source.nodeId == '6_12890134_-0') debugger
        var numSlots = links[0].source.node.memberNodes.length
        var totalWidth = (Math.min(4, numSlots))*8
        d3.sort(links, d => Math.atan2(d.target.y - d.source.y, d.target.x - d.source.x))
          .forEach((d, i) => d.sourceOffsetX = (i - links.length/2)*totalWidth/links.length)
      })

      d3.nestBy(sgLinks, d => d.target).forEach(links => {
        var numSlots = links[0].target.node.memberNodes.length
        var totalWidth = (Math.min(4, numSlots) + 1)*3
        d3.sort(links, d => -Math.atan2(d.source.y - d.target.y, d.source.x - d.target.x))
          .forEach((d, i) => d.targetOffsetX = (i - links.length/2)*totalWidth/links.length)
      })

      svgPaths.at({
        d: d => {
          var x0 = d.source.x + nodeWidth/2 + d.sourceOffsetX
          var y0 = d.source.y
          var x1 = d.target.x + nodeWidth/2 + d.targetOffsetX
          var y1 = d.target.y + d.target.textHeight + 28

          return `M${x0},${y0} L${x1},${y1}`
        },
      })
    }
  }


  function styleNodes() {
    if (!nodeSel) return

    nodeSel
      .classed('clicked', d => d.nodeId == visState.clickedId)
      .classed('hovered', d => d.featureId == visState.hoveredId)
      .st({zIndex: d => Math.round(d.x*20 + d.y) + 1000})
      .classed('grouping-selected', d => subgraphState.activeGrouping.selectedNodeIds.has(d.nodeId))

    memberNodeSel
      .classed('clicked', d => d.nodeId == visState.clickedId)
      .classed('hovered', d => d.featureId == visState.hoveredId)
      .st({
        background: d => d.tmpClickedLink?.pctInputColor,
        color: d => utilCg.bgColorToTextColor(d.tmpClickedLink?.pctInputColor)
      })
      // .at({title: d => d3.format('.1%')(d.tmpClickedLink?.pctInput)})



    // style clicked links using supernode adjusted graph when possible
    sgNodes.forEach(d => {
      d.tmpClickedSgSource = d.tmpClickedLink?.sourceNode == d ? d.tmpClickedLink : null
      d.tmpClickedSgTarget = d.tmpClickedLink?.targetNode == d ? d.tmpClickedLink : null
    })

    if (visState.clickedId) {
      sgLinks.forEach(d => {
        if (d.source.nodeId == visState.clickedId) nodeIdToNode[d.target.nodeId].tmpClickedSgTarget = d
        if (d.target.nodeId == visState.clickedId) nodeIdToNode[d.source.nodeId].tmpClickedSgSource = d
      })
    }

    // nodeSel.selectAll('.clicked-weight.source')
    //   .st({display: d => d.node.tmpClickedSgSource ? '' : 'none'})
    //   .filter(d => d.node.tmpClickedSgSource)
    //   .text(d => d3.format('.1%')(d.node.tmpClickedSgSource.pctInput))
    //   .st({
    //     background: d => d.node.tmpClickedSgSource.pctInputColor,
    //     color: d => utilCg.bgColorToTextColor(d.node.tmpClickedSgSource.pctInputColor)
    //   })

    // nodeSel.selectAll('.clicked-weight.target')
    //   .st({display: d => d.node.tmpClickedSgTarget ? '' : 'none'})
    //   .filter(d => d.node.tmpClickedSgTarget)
    //   .text(d => d3.format('.1%')(d.node.tmpClickedSgTarget.pctInput))
    //   .st({
    //     background: d => d.node.tmpClickedSgTarget.pctInputColor,
    //     color: d => utilCg.bgColorToTextColor(d.node.tmpClickedSgTarget.pctInputColor)
    //   })
  }

  renderAll.hClerpUpdate.fns['subgraph'] = renderSubgraph
  renderAll.pinnedIds.fns['subgraph'] = renderSubgraph
  renderAll.clickedId.fns['subgraph'] = styleNodes
  renderAll.hoveredId.fns['subgraph'] = styleNodes

  // https://github.com/1wheel/d3-force-container/blob/master/src/force-container.js
  function forceContainer(bbox) {
    var nodes, strength = 1

    function force(alpha) {
      var i,
          n = nodes.length,
          node,
          x = 0,
          y = 0

      for (i = 0; i < n; ++i) {
        node = nodes[i], x = node.x, y = node.y

        if (x < bbox[0][0]) node.vx += (bbox[0][0] - x)*alpha
        if (y < bbox[0][1]) node.vy += (bbox[0][1] - y)*alpha
        if (x > bbox[1][0]) node.vx += (bbox[1][0] - x)*alpha
        if (y > bbox[1][1]) node.vy += (bbox[1][1] - y)*alpha
      }
    }

    force.initialize = function(_){
      nodes = _
    }

    force.bbox = function(_){
      return arguments.length ? (bbox = +_, force) : bbox
    }
    force.strength = function(_){
      return arguments.length ? (strength = +_, force) : strength
    }

    return force
  }
}

window.init?.()

<script>
window.initCg = async function (sel, slug, {clickedId, clickedIdCb, isModal, isGridsnap, pruningThreshold} = {}){
  var data = await util.getFile(`./graph_data/${slug}.json`)

  var visState = {
    pinnedIds: [],
    hiddenIds: [],
    hoveredId: null,
    hoveredNodeId: null,
    hoveredCtxIdx: null,
    clickedId: null,
    clickedCtxIdx: null,
    linkType: 'either',
    isShowAllLinks: '',
    isSyncEnabled: '',
    subgraph: null,
    isEditMode: 1,
    isHideLayer: data.metadata.scan == util.scanSlugToName.h35 || data.metadata.scan == util.scanSlugToName.moc,
    graphSchemaVersion: data.metadata?.schema_version || 0,
    sg_pos: '',
    isModal: true,
    isGridsnap,
    slug: slug, // Store slug for localStorage keys
    pruningThreshold: pruningThreshold,
    ...(data.qParams ? Object.fromEntries(Object.entries(data.qParams).filter(([_, v]) => v !== null)) : {})
  }

  // Get pinnedIds from URL parameters if available (prioritized over localStorage)
  var urlPinnedIds = util.params.get('pinnedIds');
  var urlHiddenIds = util.params.get('hiddenIds');
  console.log(urlPinnedIds, urlHiddenIds)
  console.log(visState.pinnedIds, visState.hiddenIds)
  if (urlPinnedIds) visState.pinnedIds = urlPinnedIds
  if (urlHiddenIds) visState.hiddenIds = urlHiddenIds

  try {
    const supernodesParam = util.params.get('supernodes');
    if (supernodesParam) {
      visState.supernodes = JSON.parse(supernodesParam);
    }
  } catch (e) {
    console.error('Error parsing supernodes from URL:', e);
  }

  if (visState.clickedId?.includes('supernode')) delete visState.clickedId
  if (clickedId && clickedId != 'null' && !clickedId.includes('supernode-')) visState.clickedId = clickedId
  if (!visState.clickedId || visState.clickedId == 'null' || visState.clickedId == 'undefined') visState.clickedId = data.nodes.find(d => d.isLogit)?.nodeId
  if (visState.pinnedIds?.replace) visState.pinnedIds = visState.pinnedIds.split(',')
  if (visState.hiddenIds?.replace) visState.hiddenIds = visState.hiddenIds.split(',')


  // Load clerps from URL params
  const clerpsParam = util.params.get('clerps') || data.qParams.clerps;
  if (clerpsParam) {
    const clerps = JSON.parse(clerpsParam);
    visState.clerps = new Map(clerps);
  }
  data = await utilCg.formatData(data, visState)

  var renderAll = util.initRenderAll(['hClerpUpdate', 'clickedId', 'hiddenIds', 'pinnedIds', 'linkType', 'isShowAllLinks', 'features', 'isSyncEnabled', 'shouldSortByWeight', 'hoveredId'])

  function colorNodes() {
    data.nodes.forEach(d => d.nodeColor = '#fff')
  }
  colorNodes()

  // global link color —  the color scale skips #fff so links are visible
  // TODO: weight by input sum instead
  function colorLinks() {
    var absMax = d3.max(data.links, d => d.absWeight)
    var _linearAbsScale = d3.scaleLinear().domain([-absMax, absMax])
    var _linearPctScale = d3.scaleLinear().domain([-.4, .4])
    var _linearTScale = d3.scaleLinear().domain([0, .5, .5, 1]).range([0, .5 - .001, .5 + .001, 1])

    var widthScale = d3.scaleSqrt().domain([0, 1]).range([.00001, 3])

    utilCg.pctInputColorFn = d => d3.interpolatePRGn(_linearTScale(_linearPctScale(d)))

    data.links.forEach(d => {
      // d.color = d3.interpolatePRGn(_linearTScale(_linearAbsScale(d.weight)))
      d.strokeWidth = widthScale(Math.abs(d.pctInput))
      d.pctInputColor = utilCg.pctInputColorFn(d.pctInput)
      d.color = d3.interpolatePRGn(_linearTScale(_linearPctScale(d.pctInput)))
    })
  }
  colorLinks()

  renderAll.hClerpUpdate.fns.push(params => utilCg.hClerpUpdateFn(params, data))

  renderAll.hoveredId.fns.push(() => {
    // use hovered node if possible, otherwise use last occurence of feature
    var targetCtxIdx = visState.hoveredCtxIdx ?? 999
    var hoveredNodes = data.nodes.filter(n => n.featureId == visState.hoveredId)
    var node = d3.sort(hoveredNodes, d => Math.abs(d.ctx_idx - targetCtxIdx))[0]
    visState.hoveredNodeId = node?.nodeId
  })

  // set tmpClickedLink w/ strength of all the links connected the clickedNode
  renderAll.clickedId.fns.push(() => {
    clickedIdCb?.(visState.clickedId)

    var node = data.nodes.idToNode[visState.clickedId]
    if (!node){
      // for a clicked supernode, sum over memberNode links to make tmpClickedLink
      if (visState.clickedId?.startsWith('supernode-')) {
        node = {
          nodeId: visState.clickedId,
          memberNodes: visState.subgraph.supernodes[+visState.clickedId.split('-')[1]]
            .slice(1)
            .map(id => data.nodes.idToNode[id])
        }
        node.memberSet = new Set(node.memberNodes.map(d => d.nodeId))

        function combineLinks(links, isSrc) {
          return d3.nestBy(links, d => isSrc ? d.sourceNode.nodeId : d.targetNode.nodeId)
            .map(links => ({
              source: isSrc ? links[0].sourceNode.nodeId : visState.clickedId,
              target: isSrc ? visState.clickedId : links[0].targetNode.nodeId,
              sourceNode: isSrc ? links[0].sourceNode : node,
              targetNode: isSrc ? node : links[0].targetNode,
              weight: d3.sum(links, d => d.weight),
              absWeight: Math.abs(d3.sum(links, d => d.weight))
            }))
        }

        node.sourceLinks = combineLinks(node.memberNodes.flatMap(d => d.sourceLinks), true)
        node.targetLinks = combineLinks(node.memberNodes.flatMap(d => d.targetLinks), false)
      } else {
        return data.nodes.forEach(d => {
          d.tmpClickedLink = null
          d.tmpClickedSourceLink = null
          d.tmpClickedTargetLink = null
        })
      }
    }

    var connectedLinks = [...node.sourceLinks, ...node.targetLinks]
    var max = d3.max(connectedLinks, d => d.absWeight)
    var colorScale = d3.scaleSequential(d3.interpolatePRGn).domain([-max*1.1, max*1.1])

    // allowing supernode links means each node can have a both tmpClickedSourceLink and tmpClickedTargetLink
    // currently we render bidirectional links where possible, falling back to the target side links otherwises
    var nodeIdToSourceLink = {}
    var nodeIdToTargetLink = {}
    var featureIdToLink = {}
    connectedLinks.forEach(link => {
      if (link.sourceNode === node) {
        nodeIdToTargetLink[link.targetNode.nodeId] = link
        featureIdToLink[link.targetNode.featureId] = link
        link.tmpClickedCtxOffset = link.targetNode.ctx_idx - node.ctx_idx
      }
      if (link.targetNode === node) {
        nodeIdToSourceLink[link.sourceNode.nodeId] = link
        featureIdToLink[link.sourceNode.featureId] = link
        link.tmpClickedCtxOffset = link.sourceNode.ctx_idx - node.ctx_idx
      }
      // link.tmpColor = colorScale(link.pctInput)
      link.tmpColor = link.pctInputColor
    })

    data.nodes.forEach(d => {
      var link = nodeIdToSourceLink[d.nodeId] || nodeIdToTargetLink[d.nodeId]
      d.tmpClickedLink = link
      d.tmpClickedSourceLink = nodeIdToSourceLink[d.nodeId]
      d.tmpClickedTargetLink = nodeIdToTargetLink[d.nodeId]
    })

    data.features.forEach(d => {
      var link = featureIdToLink[d.featureId]
      d.tmpClickedLink = link
    })
  })

  function initGridsnap() {
    var gridData = [
      // {cur: {x: 0, y: 0,  w: 6, h: .5}, class: 'button-container'},
      {cur: {x: 0, y: 8, w: 8, h: 8}, class: 'subgraph'},
      {cur: {x: 8, y: 1, w: 6, h: 6}, class: 'node-connections'},
      {cur: {x: 8, y: 6, w: 6, h: 10}, class: 'feature-detail'},
      {cur: {x: 0, y: 0, w: 8, h: 8}, class: 'link-graph', resizeFn: makeResizeFn(initCgLinkGraph)},
      // {cur: {x: 0, y: 18, w: 6, h: 7}, class: 'clerp-list'},
      // {cur: {x: 6, y: 30, w: 4, h: 7}, class: 'feature-scatter'},
      // {cur: {x: 0, y: 30, w: 3, h: 8}, class: 'metadata'},
     ].filter(d => d)

    var initFns = [
      initCgButtonContainer,
      initCgSubgraph,
      initCgLinkGraph,
      initCgNodeConnections,
      initCgFeatureDetail,
      // initCgClerpList,
      // initCgFeatureScatter,
    ].filter(d => d)

    var gridsnapSel = sel.html('').append('div.gridsnap.cg')
      .classed('is-edit-mode', visState.isGridsnap)
    if (visState.isModal) gridsnapSel.st({width: '100%', height: '100%'})


    window.initGridsnap({
      gridData,
      gridSizeY: 50,
      pad: 10,
      sel: gridsnapSel,
      isFullScreenY: false,
      isFillContainer: visState.isModal,
      serializedGrid: data.qParams.gridsnap
    })

    initFns.forEach(fn => fn({visState, renderAll, data, cgSel: sel}))

    function makeResizeFn(fn){
      return () => {
        fn({visState, renderAll, data, cgSel: sel.select('.gridsnap.cg')})
        Object.values(renderAll).forEach(d => d())
      }
    }
  }

  initGridsnap()
  renderAll.hClerpUpdate()
  renderAll.isShowAllLinks()
  renderAll.linkType()
  renderAll.clickedId()
  renderAll.pinnedIds()
  renderAll.features()
  renderAll.isSyncEnabled()
  renderAll.hoveredId()
}

window.init?.()

</script>

<script>
window.init = async function(){
  window.isLocalServing = true;
  var {graphs} = await util.getFile('./data/graph-metadata.json', false)

  window.visState = window.visState || {
    slug: util.params.get('slug') || graphs[0].slug,
    clickedId: util.params.get('clickedId')?.replace('null', ''),
    isGridsnap: util.params.get('isGridsnap')?.replace('null', ''),
  }

  // Find the current graph metadata
  var currentGraph = graphs.find(g => g.slug === visState.slug)

  // Initialize pruningThreshold only if the graph has node_threshold
  if (currentGraph && typeof currentGraph.node_threshold === 'number') {
    visState.pruningThreshold = util.params.get('pruningThreshold') || currentGraph.node_threshold || 0.4
  }

  // Create a container for the controls
  var navSel = d3.select('.nav').html('')
    .style('display', 'flex')
    .style('align-items', 'center')
    .style('padding-bottom', '15px')
    .style('justify-content', 'space-between')

  var controlsContainer = navSel.append('div.controls-container')
    .style('display', 'flex')
    .style('align-items', 'center')
    .style('flex', '1')
    .style('gap', '20px')

  var selectSel = controlsContainer.append('select.graph-prompt-select')
    .style('min-width', '300px')
    .style('max-width', '600px')
    .on('click', async function() {
      // Refetch graphs if local serving
      if (!window.isLocalServing) return;

      var {graphs: newGraphs} = await util.getFile('./data/graph-metadata.json', false)
      graphs = newGraphs

      // Rebuild the options
      selectSel.selectAll('option').remove()
      selectSel.appendMany('option', graphs)
        .text(d => {
          var scanName = util.nameToPrettyPrint[d.scan] || d.scan
          var prefix = d.title_prefix ? d.title_prefix + ' ' : ''
          return prefix + scanName + ' — ' + d.prompt
        })
        .attr('value', d => d.slug)
        .property('selected', d => d.slug === visState.slug)
    })
    .on('change', function() {
      visState.slug = this.value
      visState.clickedId = undefined
      util.params.set('slug', this.value)

      // Update pruningThreshold when graph changes
      var newGraph = graphs.find(g => g.slug === this.value)
      if (newGraph && typeof newGraph.node_threshold === 'number') {
        visState.pruningThreshold = util.params.get('pruningThreshold') || newGraph.node_threshold || 0.4
      } else {
        delete visState.pruningThreshold
        util.params.set('pruningThreshold', null)
      }

      render()
    })

  // Create debounced render function
  var debouncedRender = util.debounce(render, 300)

  // Slider container will be created dynamically in render function
  var sliderContainer

  selectSel.appendMany('option', graphs)
    .text(d => {
      var scanName = util.nameToPrettyPrint[d.scan] || d.scan
      var prefix = d.title_prefix ? d.title_prefix + ' ' : ''
      return prefix + scanName + ' — ' + d.prompt
    })
    .attr('value', d => d.slug)
    .property('selected', d => d.slug === visState.slug)

  // Add save button to the right
  var saveButton = navSel.append('button.save-button')
    .text('Save')
    .style('display', window.isLocalServing ? 'block' : 'none')
    .on('click', function() {
      // Get current graph info


      var slug = visState.slug;
      if (!slug) {
        console.error("No slug found");
        return;
      }

      var url = `/save_graph/${slug}`;

      // Show loading state
      saveButton.text("Saving...")
        .attr("disabled", true)
        .style("opacity", 0.6);

      // Send the POST request
      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          qParams: Object.fromEntries(["pinnedIds", "supernodes", "linkType", "clickedId", "sg_pos", "pruningThreshold", "clerps"]
            .map(k => [k, util.params.get(k)])
            .filter(([k, v]) => v !== undefined && v !== 'null')
          ),
          timestamp: new Date().toISOString()
        })
      })
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        return 1;
        // return response.text();
      })
      .then(data => {
        console.log("Graph saved successfully:", data);
        saveButton.text("Saved!")
          .style("background-color", "#e6f7e6")
          .style("border-color", "#8bc34a");

        // Reset button after 2 seconds
        setTimeout(() => {
          saveButton.text("Save")
            .attr("disabled", null)
            .style("opacity", null)
            .style("background-color", null)
            .style("border-color", null);
        }, 2000);
      })
      .catch(error => {
        console.error("Error saving graph:", error);
        saveButton.text("Error!")
          .style("background-color", "#ffebee")
          .style("border-color", "#f44336");

        // Reset button after 2 seconds
        setTimeout(() => {
          saveButton.text("Save")
            .attr("disabled", null)
            .style("opacity", null)
            .style("background-color", null)
            .style("border-color", null);
        }, 2000);
      });
    });

  function render() {
    var m = graphs.find(g => g.slug == visState.slug)
    if (!m) return

    // Handle slider creation/removal dynamically
    if (m && typeof m.node_threshold === 'number') {
      // Create slider if it doesn't exist
      if (!sliderContainer) {
        sliderContainer = controlsContainer.append('div.slider-container')
          .style('display', 'flex')
          .style('align-items', 'center')
          .style('gap', '8px')

        sliderContainer.append('span').text('Pruning:')

        var sliderSel = sliderContainer.append('input')
          .attr('type', 'range')
          .attr('min', 0)
          .attr('max', m.node_threshold)
          .attr('step', 0.01)
          .attr('value', visState.pruningThreshold || m.node_threshold)
          .on('input', function() {
            // Update state and UI immediately
            visState.pruningThreshold = this.value
            visState.clickedId = util.params.get('clickedId')?.replace('null', '')
            util.params.set('pruningThreshold', this.value)
            valueDisplay.text(parseFloat(this.value).toFixed(2))

            // Debounce the actual render
            debouncedRender()
          })

        var valueDisplay = sliderContainer.append('span.value-display')
          .text(parseFloat(visState.pruningThreshold || m.node_threshold).toFixed(2))
      }

      // Update slider properties for current graph
      sliderContainer.select('input')
        .attr('max', m.node_threshold)
        .property('value', visState.pruningThreshold || m.node_threshold)

      sliderContainer.select('.value-display')
        .text(parseFloat(visState.pruningThreshold || m.node_threshold).toFixed(2))

      sliderContainer.style('display', 'flex')

      // Ensure pruningThreshold is set
      if (visState.pruningThreshold === undefined) {
        visState.pruningThreshold = m.node_threshold
      }
    } else {
      // Remove slider if graph doesn't support pruning
      if (sliderContainer) {
        sliderContainer.remove()
        sliderContainer = null
      }
      delete visState.pruningThreshold
      util.params.set('pruningThreshold', null)
    }

    d3.select('.cg').html('')

    // Prepare options for initCg
    var options = {
      clickedId: visState.clickedId,
      clickedIdCb: id => util.params.set('clickedId', id),
      isGridsnap: visState.isGridsnap || true
    }

    // Only add pruningThreshold to options if it exists
    if (visState.pruningThreshold !== undefined) {
      options.pruningThreshold = visState.pruningThreshold
    }

    initCg(d3.select('.cg'), visState.slug, options)

    selectSel.at({title: m.prompt})
    document.title = 'Attribution Graph: ' + m.prompt
  }
  render()
}

window.init()
</script>
