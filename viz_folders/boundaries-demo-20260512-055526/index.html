<script>
// ─── relp-circuits standalone-folder bootstrap ───
// `data.js` (loaded via <script src> above) has set:
//   window.__RELP_DATA      — {"<path>": <json>, ...}
//   window.__RELP_EXEMPLARS — {"<L>_<N>_<sign>": [...], ...}
// We populate util.getFile's cache from those globals and also install a
// fetch interceptor that short-circuits any relative-path fetch the
// frontend issues — `file://` opens block real cross-origin fetches, so
// this guarantees zero network traffic.
window.isLocalServing = true;

(function () {
  const __DATA = window.__RELP_DATA || {};
  const __EXEMPLARS = window.__RELP_EXEMPLARS || {};

  window.__datacache = {};
  for (const [k, v] of Object.entries(__DATA)) {
    window.__datacache[k] = Promise.resolve(v);
    window.__datacache[k + "-json"] = Promise.resolve(v);
  }

  function pathVariants(k) {
    const out = new Set([k]);
    if (k.startsWith("./")) {
      const s = k.slice(2);
      out.add(s);
      out.add("/" + s);
    }
    return out;
  }
  const JSON_FOR_PATH = {};
  for (const [k, v] of Object.entries(__DATA)) {
    const body = JSON.stringify(v);
    for (const p of pathVariants(k)) JSON_FOR_PATH[p] = body;
  }

  function jsonResponse(body) {
    return new Response(body, {
      status: 200,
      headers: { "Content-Type": "application/json" },
    });
  }

  const origFetch = window.fetch ? window.fetch.bind(window) : null;
  window.fetch = function (input, opts) {
    let url = (typeof input === "string") ? input : (input && input.url) || "";
    if (typeof url === "string") {
      let probe = url;
      const m = probe.match(/^file:\/\/[^/]*(\/.*)$/);
      if (m) probe = m[1];
      if (JSON_FOR_PATH[probe] !== undefined) {
        return Promise.resolve(jsonResponse(JSON_FOR_PATH[probe]));
      }
      for (const k of Object.keys(JSON_FOR_PATH)) {
        if (k.startsWith("./") && probe.endsWith(k.slice(1))) {
          return Promise.resolve(jsonResponse(JSON_FOR_PATH[k]));
        }
      }
      if (url.includes("/api/neuron_exemplars")) {
        const u = new URL(url, "http://localhost");
        const layer = u.searchParams.get("layer");
        const neuron = u.searchParams.get("neuron");
        const sign = u.searchParams.get("sign") || "+";
        const key = layer + "_" + neuron + "_" + (sign === "-" ? "-" : "+");
        const data = __EXEMPLARS[key] || { isDead: true };
        return Promise.resolve(jsonResponse(JSON.stringify(data)));
      }

      // The Transluce util.js rewrites `./features/X` and (sometimes)
      // `./data/X` to Cloudfront. We never serve from the network in the
      // baked artifact, so synthesize a "no remote feature data" response.
      // For features/<scan>/<cantor>.json: try the exemplar map first
      // (decoded from cantor pair → (layer, neuron)); fall back to isDead.
      if (
        url.includes("d1fk9w8oratjix.cloudfront.net") ||
        url.includes("/features/") ||
        url.includes("/data/")
      ) {
        const m = url.match(/features\/[^/]+\/(\d+)\.json/);
        if (m) {
          // Cantor unpair: f = ((x+y)*(x+y+1))/2 + y, recover (x, y).
          const f = parseInt(m[1], 10);
          const w = Math.floor((Math.sqrt(8 * f + 1) - 1) / 2);
          const t = (w * w + w) / 2;
          const y = f - t;
          const x = w - y;
          for (const sign of ["+", "-"]) {
            const k = x + "_" + y + "_" + sign;
            if (__EXEMPLARS[k]) {
              return Promise.resolve(jsonResponse(JSON.stringify(__EXEMPLARS[k])));
            }
          }
        }
        return Promise.resolve(jsonResponse(JSON.stringify({ isDead: true })));
      }
    }
    return origFetch ? origFetch(input, opts) : Promise.reject(new Error("no fetch"));
  };
})();
</script>

<style>

.gridsnap-container {
  position: relative;
  width: 100%;
  height: 100%;

  .grid-item {
    position: absolute;
    outline: 1px solid #eee;
  }

  .dragging {
    opacity: .5;
    z-index: 100;
  }

  .resize-handle,
  .move-handle {
    position: absolute;
    bottom: 0;
    width: 20px;
    height: 20px;
    font-size: 12px;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    display: none;
    pointer-events: none;
    z-index: 100000000;

    .grid-item:hover & {
      display: flex;
      pointer-events: auto;
    }
  }

  .resize-handle {
    right: 0;
    cursor: se-resize;
  }

  .move-handle {
    right: 20px;
    cursor: move;
  }

  .preview {
    position: absolute;
    background: yellow;
    opacity: .3;
    pointer-events: none;
    z-index: 10;
  }

  .grid-contents{
    width: 100% !important;
    height: 100% !important;
  }
}

.gridsnap:not(.is-edit-mode) {
    .resize-handle, .move-handle {
        display: none !important;
    }
}




.gridsnap-container.dragging{
    .grid-item{
        outline: 3px solid #000;
    }
    .grid-contents{
        pointer-events: none;
    }
}

<style>
.feature-examples {
    display: flex;
    flex-direction: column;
    position: relative;

    .example-2-col {
        flex: 1;
        overflow: visible;
        overflow-x: hidden;
        position: relative;
        z-index: 100;
    }

    .chart-row{
        display: grid;
        grid-template-columns: 2fr 1fr;
        &:has(> :only-child) {
            grid-template-columns: 1fr;
        }

        gap: 20px;
        line-height: 0px;
    }

    .feature-example-logits{
        color: hsl(0 0 0 / 0.5);
        font-size: 10px;
        font-family: sans-serif;
        line-height: 14px;
        position: sticky;
        top: 0px;
        background: #fff;
        z-index: 100000;
        margin-bottom: -4px;
        outline: 2px solid #fff;

        .section-title{
            margin-bottom: 3px;
        }

        .token {
            display: inline-block;
            margin-left: 0.2em;
            background-color: #eee;
            color: #666;
            padding: 1px 3px !important;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre;
            overflow-y: hidden;
            vertical-align: middle;
            max-height: 13px;
            margin-right: 2px;
        }

        .logit-label {
            display: inline-block;
            margin-right: 7px;
            color: #aaa;
            padding-right: 3px;
        }
    }

    .example-2-col:not(:last-child) {
        margin-right: 10px;
    }

    .example-quantile {
        margin: 0;
        margin-top: 20px;
    }

    .train_token_ind{
        outline: 1px solid #000;
    }

    .ctx-container {
        font-family: monospace;
        font-size: 11px;
        line-height: 11px;
        padding: 6px 0px 4px;
        border-bottom: 1px solid #eee;
        border-left: 2px solid rgba(0, 0, 0, 0);

        overflow: visible;
        white-space: nowrap;
        position: relative;
        a, .dataset-source{
            margin-right: 7px;
            color: #aaa;
            display: inline-block;
        }

        .dataset-source{
            padding-right: 3px;
            border-right: 1px solid #eee
        }
    }

    .is-repeated-datapoint{
        opacity: .2;
    }
    .is-repeated-datapoint:before {
        content: '⟳ ';
    }

    .ctx-container .token {
        border-radius: 4px;
        padding: 1px;
        cursor: default;
        white-space: pre;
    }

    .ctx-container .token.active {
        outline: 2px solid #000;
        overflow: visible;
    }

    svg{
        overflow: visible;
    }

    &.is-stale-output {
        td span, .text-wrapper, .token {
            opacity: 0;
        }
    }
}

<script>
window.initFeatureExamplesList = function({renderAll, visState, sel}){
  var sel = sel.select('.feature-example-list')
  renderAll.feature.fns.push(async () => {
    if (visState.feature.isDead) return sel.html(`Feature ${visState.feature.featureIndex} failed to load`)
    // // Put quantiles into cols to fill white space.
    // var cols = d3.range(Math.max(1, Math.floor(sel.node().offsetWidth/800))).map(d => [])
    // cols.forEach(col => col.y = 0)
    // visState.feature.examples_quantiles.forEach((d, i) => {
    //   var col = cols[d3.minIndex(cols, d => d.y)]
    //   col.push(d)
    //   col.y += d.examples.length + 2 // quantile header/whitespace is about 2× bigger than an example
    //   if (!i) col.y += 6
    // })
    //
    var cols = [visState.feature.examples_quantiles]
    sel.html('')
      .appendMany('div.example-2-col', cols)
      .appendMany('div', d => d)
      .each(drawQuantile)
  })

  function drawQuantile(quantile){
    var sel = d3.select(this)

    var quintileSel = sel.append('div.example-quantile')
      .append('span.quantile-title').text(quantile.quantile_name + ' ')

    sel.appendMany('div.ctx-container', quantile.examples).each(drawExample)
  }

  function maybeHexEscapedToBytes(token) { // -> number[]
    let ret = [];
    while (token.length) {
      if (/^\\x[0-9a-f]{2}/.exec(token)) {
        ret.push(parseInt(token.slice(2, 4), 16));
        token = token.slice(4);
      } else {
        ret.push(...new TextEncoder().encode(token[0]));
        token = token.slice(1);
      }
    }
    return ret;
  }
  function mergeHexEscapedMax(tokens, acts) {
    // -> {token: string, act: number, minIndex: int, maxIndex: int}[]
    let ret = [];
    let i = 0;
    while (i < tokens.length) {
      let maxAct = acts[i];
      let pushedMerge = false;
      if (/\\x[0-9a-f]{2}/.exec(tokens[i])) {
        let buf = maybeHexEscapedToBytes(tokens[i]);
        for (let j = i + 1; j < Math.min(i + 5, tokens.length); j++) {
          maxAct = Math.max(maxAct, acts[j]);
          buf.push(...maybeHexEscapedToBytes(tokens[j]));
          try {
            let text = new TextDecoder("utf-8", { fatal: true }).decode(
              new Uint8Array(buf),
            );
            ret.push({
              token: text,
              act: maxAct,
              minIndex: i,
              maxIndex: j,
            });
            i = j + 1;
            pushedMerge = true;
            break;
          } catch (e) {
            continue;
          }
        }
      }
      if (!pushedMerge) {
        ret.push({
          token: tokens[i],
          act: acts[i],
          minIndex: i,
          maxIndex: i,
        });
        i++;
      }
    }
    return ret;
  }

  function mergeConsecutiveSameActivations(tokens) {
    // Merge tokens with the same activation level
    const merged = [];
    let currentGroup = null;

    for (let i = 0; i < tokens.length; i++) {
      const token = tokens[i];

      if (!currentGroup) {
        // Start a new group
        currentGroup = {
          token: token.token,
          act: token.act,
          minIndex: token.minIndex,
          maxIndex: token.maxIndex
        };
      } else if (currentGroup.act === token.act) {
        // Same activation, merge with current group
        currentGroup.token += token.token;
        currentGroup.maxIndex = token.maxIndex;
      } else {
        // Different activation, push current group and start a new one
        merged.push(currentGroup);
        currentGroup = {
          token: token.token,
          act: token.act,
          minIndex: token.minIndex,
          maxIndex: token.maxIndex
        };
      }
    }

    // Don't forget to add the last group
    if (currentGroup) {
      merged.push(currentGroup);
    }

    return merged;
  }

  function drawExample(exp){
    var sel = d3.select(this).append('div')
      .st({opacity: exp.is_repeated_datapoint ? .4 : 1})
    var textSel = sel.append('div.text-wrapper')

    // First merge hex-escaped sequences
    var tokenData = mergeHexEscapedMax(exp.tokens, exp.tokens_acts_list);

    // Then merge consecutive tokens with the same activation
    tokenData = mergeConsecutiveSameActivations(tokenData);

    var tokenSel = textSel.appendMany('span.token', tokenData)
        .text(d => d.token)
        // .at({title: d => `${d.token} (${d.act})` })

    tokenSel
        .filter(d => d.act)
        .st({background: d => visState.feature.colorScale(d.act)})

    // We need to track if our merged token contains the train_token_ind
    var centerNode = tokenSel
        .filter(d => d.minIndex <= exp.train_token_ind && exp.train_token_ind <= d.maxIndex)
        .classed('train_token_ind', 1)
        .node()

    if (!centerNode) return

    const resizeObserver = new ResizeObserver(entries => {
      const selWidth = sel.node().offsetWidth;
      const nodeWidth = centerNode.offsetWidth;
      const nodeLeft = centerNode.offsetLeft;
      const leftOffset = (selWidth - nodeWidth)/2 - nodeLeft;
      textSel.translate([leftOffset, 0]);
    });
    resizeObserver.observe(sel.node());
  }
}

// window.initFeatureExample?.()
window.init?.()

</script>
<script>
window.initFeatureExamplesLogits = function({renderAll, visState, sel}) {
  renderAll.feature.fns.push(async () => {
    let { top_logits, bottom_logits } = visState.feature;
    if (!top_logits?.length && !bottom_logits?.length) return;

    var containerSel = sel.select('.feature-example-logits').html('')
    containerSel.append('div.section-title').text('Token Predictions')
    // containerSel.parent().st({position: 'sticky', top: 0})

    for (let [rowName, logits] of [['Top', top_logits], ['Bottom', bottom_logits]]) {
      if (!logits?.length) continue;

      var row = containerSel.append('div.ctx-container')
      row.append('div.logit-label').text(rowName)

      row.appendMany('span.token', logits).text(d => d)
    }
  })
}

window.init?.()

</script>
<script>
window.initFeatureExamples = function({containerSel, showLogits=true, showExamples=true, hideStaleOutputs=false}){
  var visState = {
    isDev: 0,
    showLogits,
    showExamples,
    hideStaleOutputs,

    activeToken: null,
    feature: null,
    featureIndex: -1,

    chartRowTop: 16,
    chartRowHeight: 82,
  }

  var indexFileExistsCache = new Map()
  var neuronAPICache = new Map()

  // set up dom and render fns
  var sel = containerSel.html('').append('div.feature-examples')
  if (visState.showLogits) sel.append('div.feature-example-logits')
  if (visState.showExamples) sel.append('div.feature-example-list')
  var renderAll = util.initRenderAll(['feature'])


  if (visState.showLogits) window.initFeatureExamplesLogits({renderAll, visState, sel})
  if (visState.showExamples) window.initFeatureExamplesList({renderAll, visState, sel})

  function isCached(featureIndex, sign) {
    var cacheKey = `${featureIndex}_${sign || '+'}`
    return neuronAPICache.has(cacheKey)
  }

  function clearExamples() {
    visState.featureIndex = -1
    visState.feature = null
    renderAll.feature()
  }

  return {loadFeature, renderFeature, isCached, clearExamples}

  async function renderFeature(scan, featureIndex, layerIdx, sign){
    if (featureIndex == visState.featureIndex) return
    // Clear stale content immediately while loading
    visState.featureIndex = featureIndex
    visState.feature = null
    renderAll.feature()
    if (visState.hideStaleOutputs) sel.classed('is-stale-output', 1)
    var feature = await loadFeature(scan, featureIndex, layerIdx, sign)
    if (feature.featureIndex == visState.featureIndex){
      visState.feature = feature
      renderAll.feature()
      if (visState.hideStaleOutputs) sel.classed('is-stale-output', 0)
    }

    return feature
  }

  function hfUrl(scan, path) {
    const [repoId, rest] = scan.split('//')
    const [filePath, revision] = rest ? rest.split('@') : [null, scan.split('@')[1]]
    const prefix = filePath ? `${filePath}/` : ''
    return `https://huggingface.co/${repoId.split('@')[0]}/resolve/${revision || 'main'}/${prefix}features/${path}`
  }

  function indexFileExists(scan) {
    if (indexFileExistsCache.has(scan)) return indexFileExistsCache.get(scan)

    const promise = fetch(hfUrl(scan, 'index.json.gz'), { method: 'HEAD' })
      .then(response => response.ok)
      .catch(error => {
        if (error.status === 404) {
          return false
        } else {
          throw error
        }
      })

    indexFileExistsCache.set(scan, promise)
    return promise
  }

  async function loadFeatureFromBinary(scan, featureIndex) {
    const [layerIdx, featIdx] = util.cantorUnpair(featureIndex)
    const indexData = await util.getFile(hfUrl(scan, 'index.json.gz'))
    const offsets = indexData[layerIdx]['offsets']
    const binFilename = indexData[layerIdx]['filename']
    const startByte = offsets[featIdx]
    const endByte = offsets[featIdx + 1]

    if (!binFilename || !offsets) {
      throw new Error(`Feature ${featureIndex} not found in index`)
    }

    return await util.getFile(hfUrl(scan, binFilename), true, 'bin', `bytes=${startByte}-${endByte}`)
  }


  async function loadFeatureFromNeuronAPI(featureIndex, sign) {
    const cacheKey = `${featureIndex}_${sign}`
    if (neuronAPICache.has(cacheKey)) return neuronAPICache.get(cacheKey)
    const [layerIdx, neuronIdx] = util.cantorUnpair(featureIndex)
    const signParam = sign === '-' ? '-' : '%2B'
    const response = await fetch(`/api/neuron_exemplars?layer=${layerIdx}&neuron=${neuronIdx}&sign=${signParam}`)
    if (!response.ok) throw new Error(`API returned ${response.status}`)
    const data = await response.json()
    neuronAPICache.set(cacheKey, data)
    return data
  }

  async function loadFeature(scan, featureIndex, layerIdx, sign){
    if (scan.startsWith('./')) {
      var feature = await  util.getFile(`${scan}/${featureIndex}.json`)
    } else if (await indexFileExists(scan)){
      var feature = await loadFeatureFromBinary(scan, featureIndex)
    } else {
      try {
        var feature = await  util.getFile(`./features/${scan}/${featureIndex}.json`)
      } catch(e) {
        var feature = await loadFeatureFromNeuronAPI(featureIndex, sign)
      }
    }

    if (feature.act_min === undefined) {
      feature.act_min = 0
      feature.act_max = 1.4
    }

    feature.colorScale = d3.scaleSequential(d3.interpolateOranges)
      .domain([feature.act_min, feature.act_max]).clamp(1)

    feature.featureIndex = featureIndex
    feature.scan = scan

    return feature
  }
}

window.init?.()

<script>
window.util = (function () {
  var params = (function(){
    var rv = {}

    rv.get = key => {
      var url = new URL(window.location)
      var searchParams = new URLSearchParams(url.search)

      var str = searchParams.get(key)
      return str && decodeURIComponent(str)
    }

    rv.getAll = () => {
      var url = new URL(window.location)
      var searchParams = new URLSearchParams(url.search)

      var values = {}
      for (const [key, value] of searchParams.entries()) {
        values[key] = decodeURIComponent(value)
      }
      return values
    }

    rv.set = (key, value) => {
      var url = new URL(window.location)
      var searchParams = new URLSearchParams(url.search)

      if (value === null) {
        searchParams.delete(key)
      } else {
        searchParams.set(key, value)
      }

      url.search = searchParams.toString()
      history.replaceState(null, '', url)
    }

    return rv
  })()

  async function getFile(path, useCache = true, fileType = null, range = null) {
    // Cache storage
    var __datacache = window.__datacache = window.__datacache || {}

    if (path.startsWith('./features/')) {
      path = path.replace('./features/', 'https://d1fk9w8oratjix.cloudfront.net/features/')
    }

    if (!window.isLocalServing){
      if (window.location.hostname === 'localhost' && path.startsWith('./data/')) {
        path = path.replace('./data/', 'https://d1fk9w8oratjix.cloudfront.net/data/')
      }

      if (window.location.hostname === 'localhost' && path.startsWith('./graph_data/')) {
        path = path.replace('./graph_data/', 'https://d1fk9w8oratjix.cloudfront.net/graph_data/')
      }
    }

    // Return cached result if available
    var cacheKey = path + (range ? `-${range}` : '') + (fileType ? `-${fileType}` : '')
    if (!useCache || !__datacache[cacheKey]) __datacache[cacheKey] = __fetch()
    return __datacache[cacheKey]

    async function __fetch() {
      var cacheOption = useCache ? 'force-cache' : 'no-cache'
      var headers = range ? {'Range': range} : {}
      var res = await fetch(path, {cache: cacheOption, headers})

      if (res.status == 500) {
        var resText = await res.text()
        console.log(resText, res)
        throw '500 error'
      }

      var type = fileType || path.replaceAll('..', '').split('.').at(-1)
      if (type == 'csv') {
        return d3.csvParse(await res.text())
      } else if (type == 'npy') {
        return npyjs.parse(await res.arrayBuffer())
      } else if (type == 'json') {
        return await res.json()
      } else if (type == 'jsonl') {
        var text = await res.text()
        return text.split(/\r?\n/).filter(d => d).map(line => JSON.parse(line))
      } else if (type == 'json.gz' || type == 'gz' && path.endsWith('.json.gz')) {
        var compressedData = await res.arrayBuffer()
        var decompressed = pako.inflate(new Uint8Array(compressedData), { to: 'string' })
        return JSON.parse(decompressed)
      } else if (type == 'bin') {
        var bytes = new Uint8Array(await res.arrayBuffer())
        var dataLength = bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24)
        var decompressed = pako.inflate(bytes.slice(4, 4 + dataLength), { to: 'string' })
        return JSON.parse(decompressed)
      } else {
        return await res.text()
      }
    }
  }


  function addAxisLabel(c, xText, yText, title='', xOffset=0, yOffset=0, titleOffset=0){
    c.svg.select('.x').append('g')
      .translate([c.width/2, xOffset + 25])

    c.svg.select('.y')

    c.svg

      .translate([c.width/2, titleOffset -10])
      .append('text.axis-label.axis-title')

  }

  function ggPlot(c){
    c.svg.append('rect.bg-rect')
      .at({width: c.width, height: c.height, fill: c.isBlack ? '#000' : '#EAECED'}).lower()
    c.svg.selectAll('.domain').remove()

      .selectAppend('path').at({d: 'M 0 0 V -' + c.height, stroke: c.isBlack ? '#444' : '#fff', strokeWidth: 1})

    c.svg.selectAll('.y .tick')
      .selectAppend('path').at({d: 'M 0 0 H ' + c.width, stroke: c.isBlack? '#444' : '#fff', strokeWidth: 1})

    ggPlotUpdate(c)
  }

  function ggPlotUpdate(c){
    c.svg.selectAll('.tick').selectAll('line').remove()

    c.svg.selectAll('.x text').at({y: 4})
    c.svg.selectAll('.x .tick')
      .selectAppend('path').at({d: 'M 0 0 V -' + c.height, stroke: c.isBlack ? '#444' : '#fff', strokeWidth: 1})

    c.svg.selectAll('.y text').at({x: -3})
    c.svg.selectAll('.y .tick')
      .selectAppend('path').at({d: 'M 0 0 H ' + c.width, stroke: c.isBlack? '#444' : '#fff', strokeWidth: 1})

  function initRenderAll(fnLabels){
    var rv = {}
    fnLabels.forEach(label => {
      rv[label] = (ev) => Object.values(rv[label].fns).forEach(d => d(ev))
      rv[label].fns = []
    })

    return rv
  }

  function attachRenderAllHistory(renderAll, skipKeys=['hoverId', 'hoverIdx']) {
    // Add state pushing to each render function
    Object.keys(renderAll).forEach(key => {
      renderAll[key].fns.push(() => {
        if (skipKeys.includes(key)) return
        var simpleVisState = {...visState}
        skipKeys.forEach(key => delete simpleVisState[key])

        var url = new URL(window.location)
        if (visState[key] == url.searchParams.get(key)) return
        url.searchParams.set(key, simpleVisState[key])
        history.pushState(simpleVisState, '', url)
      })
    })

    // Handle back/forward navigation
    d3.select(window).on('popstate.updateState', ev => {
      if (!ev.state) return
      ev.preventDefault()
      Object.keys(renderAll).forEach(key => {
        if (skipKeys.includes(key)) return
        if (visState[key] == ev.state[key]) return
        visState[key] = ev.state[key]
        renderAll[key]()
      })
    })
  }

  function throttle(fn, delay){
    var lastCall = 0
    return (...args) => {
      if (Date.now() - lastCall < delay) return
      lastCall = Date.now()
      fn(...args)
    }
  }

  function debounce(fn, delay) {
    var timeout
    return (...args) => {
      clearTimeout(timeout)
      timeout = setTimeout(() => fn(...args), delay)
    }
  }

  function throttleDebounce(fn, delay) {
    var lastCall = 0
    var timeoutId

    return function (...args) {
      clearTimeout(timeoutId)
      var remainingDelay = delay - (Date.now() - lastCall)
      if (remainingDelay <= 0) {
        lastCall = Date.now()
        fn.apply(this, args)
      } else {
        timeoutId = setTimeout(() => {
          lastCall = Date.now()
          fn.apply(this, args)
        }, remainingDelay)
      }
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms))
  }

  function cantorUnpair(z) {
    const w = Math.floor((Math.sqrt(8 * z + 1) - 1) / 2)
    const t = (w * w + w) / 2
    const y = z - t
    const x = w - y
    return [x, y]
  }

  function cache(fn){
    var cache = {}
    return function(...args){
      var key = JSON.stringify(args)
      if (!(key in cache)) cache[key] = fn.apply(this, args)
      return cache[key]
    }
  }

  async function initGraphSelect(sel, cgSlug){

    function render() {

  function attachCgLinkEvents(sel, cgSlug, figmaSlug){
    sel
      .on('mouseover', () => util.getFile(`./graph_data/${cgSlug}.json`))
      .on('click', (ev) => {

        if (window.innerWidth < 900 || window.innerHeight < 500) {
          return window.open(`./static_js/attribution_graphs/index.html?slug=${cgSlug}`, '_blank')
        }

        d3.select('body').classed('modal-open', true)
        var contentSel = d3.select('modal').classed('is-active', 1)
          .select('.modal-content').html('')

        util.initGraphSelect(contentSel, cgSlug)

        util.params.set('slug', cgSlug)
        if (figmaSlug) history.replaceState(null, '', '#' + figmaSlug)
      })
  }

  // TODO: tidy
  function ppToken(d){
    return d
  }

  function ppClerp(d){
    return d
  }


  var scanSlugToName = {
    'h35': 'jackl-circuits-runs-1-4-sofa-v3_0',
    '18l': 'jackl-circuits-runs-1-1-druid-cp_0',
    'moc': 'jackl-circuits-runs-12-19-valet-m_0'
  }

  var nameToPrettyPrint = {
    'jackl-circuits-runs-1-4-sofa-v3_0': 'Haiku',
    'jackl-circuits-runs-1-1-druid-cp_0': '18L',
    'jackl-circuits-runs-12-19-valet-m_0': 'Model Organism',
    'jackl-circuits-runs-1-12-rune-cp3_0': '18L PLTs',
  }


  return {
    scanSlugToName,
    nameToPrettyPrint,
    params,
    getFile,
    addAxisLabel,
    ggPlot,
    ggPlotUpdate,
    initRenderAll,
    attachRenderAllHistory,
    throttle,
    debounce,
    throttleDebounce,
    sleep,
    cache,
    initGraphSelect,
    attachCgLinkEvents,
    ppToken,
    ppClerp,
    cantorUnpair,
  }
})()

<script>
window.utilCg = (function(){
  function clerpUUID(d){
    // Handle case where d.featureId is undefined
    if (!d.featureId) return '🤖' + d.feature;

    // Split featureId by underscore and take first two parts
    const parts = d.featureId.split('_');
    return '🤖' + parts[0] + '_' + parts[1];
  }

  function parseClerpUUID(str){
    var [featureIndex] = str.split('🤖')
    return {featureIndex}
  }

  function loadDatapath(urlStr){
    try {
      var url = new URL(urlStr)
      urlStr = url.searchParams.get('datapath') ?? urlStr
    } catch {}
    urlStr = urlStr?.replace('index.html', 'data.json').split('?')[0] || 'data.json'

    try {
      return util.getFile(urlStr)
    } catch (exc) {
      d3.select('body')
        .html(`Couldn't load data from <code>${urlStr}</code>: ${exc}. Maybe you need to specify a <code>?datapath=</code> argument?`)
        .st({color: '#c00', fontSize: '150%', padding: '1em', whiteSpace: 'pre-wrap'})
      throw exc
    }
  }

  function saveHClerpsToLocalStorage(hClerps, scan) {
    const key = `local-clerp-${scan}`
    const hClerpArray = Array.from(hClerps.entries()).filter(d => d[1])
    localStorage.setItem(key, JSON.stringify(hClerpArray));
  }

  function getHClerpsFromLocalStorage(scan) {
    const key = `local-clerp-${scan}`
    // We want to set on load here so that any page load will fix the key.
    if (localStorage.getItem(key) === null) localStorage.setItem(key, '[]')
    const hClerpArray = JSON.parse(localStorage.getItem(key))
      .filter(d => d[0] != clerpUUID({}))
    return new Map(hClerpArray)
  }

  // if we have multiple transcoder (not just one scan), loads all their clerps into one map
  function getAllHClerpsFromLocalStorage(d) {
    if (d.metadata.scan?.startsWith('custom-')){
      // iterate over all layers
      const transcoder_hclerps = d.metadata.transcoder_list.map(id => getHClerpsFromLocalStorage(id))
      return new Map(function*() {
        for (const map of transcoder_hclerps) {
          yield* map;
        }
      }());
    } else {
      return getHClerpsFromLocalStorage(d.metadata.scan)
    }
  }

  async function deDupHClerps(scan) {
    const remoteClerps = []
    let remoteMap = new Map(remoteClerps.map(d => {
      let key = clerpUUID(d);
      let clerp = d.clerp;
      return [key, clerp];
    }));

    let localClerps = getHClerpsFromLocalStorage(scan)
    let featureLookup = {}
    data.features.forEach(d => featureLookup[clerpUUID(d)] = d)

    // update feature data with current spreadsheet
    // (why is this behind the "copy" button?)
    Array.from(remoteMap).forEach(([key, value]) => {
      if (featureLookup[key]) featureLookup[key].remoteClerp = value
    })

    const deDupArray = Array.from(localClerps)
      .filter(([key, localClerp]) => {
        let remote = remoteMap.get(key);

        // keep only local clerps that are different from remote
        if (!remote) return true
        // gdoc to local storage mangles quotes, don't force strict equality
        function slugify(d){ return d ? d.replace(/['"]/g, '').trim() : ''}
        if (slugify(remote) != slugify(localClerp)) return true

        // if local changes are on remote, delete localClerp and set remoteClerp
        localClerps.delete(key)
        if (featureLookup[key]) featureLookup[key].localClerp = ''
      })

    // copy feature.remoteClerp to node.remoteClerp
    data.nodes?.forEach(node => {
      var feature = data.features.idToFeature[node.featureId]
      node.remoteClerp = feature.remoteClerp
      node.localClerp = feature.localClerp
    })

    saveHClerpsToLocalStorage(new Map(deDupArray), scan)
    return new Map(deDupArray);
  }

  function tabifyHClerps(hClerps) {
    return []
  }

  function hClerpUpdateFn(params, data){
    // update the relevant clerp
    if (params) {
      const [node, hClerp] = params;
      const scan = data.metadata.scan?.startsWith('custom-') ? data.metadata.transcoder_list[node.layer] : data.metadata.scan;
      console.log(`Updating clerp for node ${node.featureId} in scan ${scan}:`, hClerp)
      const localClerps = getHClerpsFromLocalStorage(scan);
      localClerps.set(clerpUUID(node), hClerp)
      saveHClerpsToLocalStorage(localClerps, scan);
    }

    // load all clerps
    const allLocalClerps = getAllHClerpsFromLocalStorage(data);

    data.features.forEach(node => {
      node.localClerp = allLocalClerps.get(clerpUUID(node))
      node.ppClerp = node.localClerp || node.remoteClerp || node.clerp;
    })

    data.nodes?.forEach(node => {
      var feature = data.features.idToFeature[node.featureId]
      if (!feature) return
      node.localClerp = feature.localClerp
      node.ppClerp = feature.ppClerp
    })

    // Save clerps to url param
    const currentFeatureIds = new Set(data.features.map(d => d.featureIndex.toString()))
    const clerps = Array.from(allLocalClerps.entries())
      .map(([key, value]) => [key.split('🤖')[1].split('_')[1], value])
      .filter(d => currentFeatureIds.has(d[0]))
    util.params.set('clerps', JSON.stringify(clerps))
  }

  // Adds virtual logit node showing A-B logit difference based on url param logitDiff=⍽tokenA⍽__vs__⍽tokenB⍽
  function addVirtualDiff(data){
    // Filter out any previous virtual nodes/links
    var nodes = data.nodes.filter(d => !d.isJsVirtual)
    var links = data.links.filter(d => !d.isJsVirtual)
    nodes.forEach(d => d.logitToken = d.clerp?.split(`"`)[1]?.split(`" k(p=`)[0])

    var [logitAStr, logitBStr] = util.params.get('logitDiff')?.split('__vs__') || []
    if (!logitAStr || !logitBStr) return {nodes, links}
    var logitANode = nodes.find(d => d.logitToken == logitAStr)
    var logitBNode = nodes.find(d => d.logitToken == logitBStr)
    if (!logitANode || !logitBNode) return {nodes, links}

    var virtualId = `virtual-diff-${logitAStr}-vs-${logitBStr}`
    var diffNode = {
      ...logitANode,
      node_id: virtualId,
      jsNodeId: virtualId,
      feature: virtualId,
      isJsVirtual: true,
      logitToken: `${logitAStr} - ${logitBStr}`,
      clerp: `Logit diff: ${logitAStr} - ${logitBStr}`,
    }
    nodes.push(diffNode)

    var targetLinks = links.filter(d => d.target == logitANode.node_id || d.target == logitBNode.node_id)
    d3.nestBy(targetLinks, d => d.source).map(sourceLinks => {
      var linkA = sourceLinks.find(d => d.target == logitANode.node_id)
      var linkB = sourceLinks.find(d => d.target == logitBNode.node_id)

      links.push({
        source: sourceLinks[0].source,
        target: diffNode.node_id,
        weight: (linkA?.weight || 0) - (linkB?.weight || 0),
        isJsVirtual: true
      })
    })

    return {nodes, links}
  }

  function replaceWhitespace(token) {
    return token.replaceAll("\n", "⏎").replaceAll("\t", "→").replaceAll("\r", "↵")
  }

  // Decorates and mutates data.json
  // - Adds pointers between node and links
  // - Deletes very common features
  // - Adds data.features and data.byStream
  async function formatData(data, visState){
    var {metadata} = data
    var {nodes, links} = addVirtualDiff(data)

    var py_node_id_to_node = {}
    var idToNode = {}
    var maxLayer = d3.max(nodes.filter(d => d.feature_type != 'logit'), d => +d.layer)

    if (visState.pruningThreshold) {
      nodes = nodes.filter(d =>
        d.feature_type === 'embedding' ||
        d.feature_type === 'logit' ||
        d.influence <= parseFloat(visState.pruningThreshold) ||
        visState.pinnedIds.includes(d.nodeId)
      )
    }

    // update all prompt tokens to replace \n, \t, \r with ⏎, →, ↵
    data.metadata.prompt_tokens = data.metadata.prompt_tokens.map(replaceWhitespace)

    nodes.forEach((d, i) => {
      // To make hover state work across prompts, drop ctx from node id
      d.featureId = `${d.layer}_${d.feature}_${d.ctx_idx}`
      if (visState.clerps && visState.clerps.has(`${d.feature}`)) {
        d.clerp = visState.clerps.get(`${d.feature}`)
      }

      d.active_feature_idx = d.feature
      d.nodeIndex = i

      if (d.feature_type == 'logit' && !isNaN(maxLayer)) d.layer = maxLayer + 1

      // TODO: does this handle error nodes correctly?
      if (d.feature_type == 'unexplored node' && !d.layer != 'E'){
        d.feature_type = 'cross layer transcoder'
      }

      // count from end to align last token on diff prompts
      d.ctx_from_end = data.metadata.prompt_tokens.length - d.ctx_idx

      // add clerp to embed and error nodes
      if (d.feature_type.includes('error')){
        d.isError = true

        if (!d.featureId.includes('__err_idx_')) d.featureId = d.featureId + '__err_idx_' + d.ctx_from_end

        if (d.feature_type == 'mlp reconstruction error' && !d.clerp) {
          d.clerp = `Err: mlp “${util.ppToken(data.metadata.prompt_tokens[d.ctx_idx])}"`
        }
      } else if (d.feature_type == 'embedding'){
        d.clerp = `Emb: “${util.ppToken(data.metadata.prompt_tokens[d.ctx_idx])}"`
      }

      d.url = d.vis_link
      d.isFeature = true

      d.targetLinks = []
      d.sourceLinks = []

      // TODO: switch to featureIndex in graphgen
      d.featureIndex = d.feature
      d.nodeId = d.node_id
      if (d.feature_type == 'logit' && d.clerp) d.logitPct= +d.clerp.split('(p=')[1].split(')')[0]
      idToNode[d.nodeId] = d
      py_node_id_to_node[d.node_id] = d
    })

    // delete features that occur in than 2/3 of tokens
    // TODO: more principled way of filtering them out — maybe by feature density?
    var deletedFeatures = []
    var byFeatureId = d3.nestBy(nodes, d => d.featureId)
    byFeatureId.forEach(feature => {
      if (feature.length > metadata.prompt_tokens.length*2/3){
        deletedFeatures.push(feature)
        feature.forEach(d => {
          delete idToNode[d.nodeId]
          delete py_node_id_to_node[d.node_id]
        })
      }
    })
    if (deletedFeatures.length) console.log({deletedFeatures})
    nodes = nodes.filter(d => idToNode[d.nodeId])
    nodes = d3.sort(nodes, d => +d.layer)

    links = links.filter(d => py_node_id_to_node[d.source] && py_node_id_to_node[d.target])

    // connect links to nodes
    links.forEach(link => {
      link.sourceNode = py_node_id_to_node[link.source]
      link.targetNode = py_node_id_to_node[link.target]

      link.linkId = link.sourceNode.nodeId + '__' + link.targetNode.nodeId

      link.sourceNode.targetLinks.push(link)
      link.targetNode.sourceLinks.push(link)
      link.absWeight = Math.abs(link.weight)
    })
    links = d3.sort(links, d => d.absWeight)


    nodes.forEach(d => {
      d.inputAbsSum = d3.sum(d.sourceLinks, e => Math.abs(e.weight))
      d.sourceLinks.forEach(e => e.pctInput = e.weight/d.inputAbsSum)
      d.inputError = d3.sum(d.sourceLinks.filter(e => e.sourceNode.isError), e => Math.abs(e.weight))
      d.pctInputError = d.inputError/d.inputAbsSum
    })

    // convert layer/probe_location_idx to a streamIdx used to position nodes
    var byStream = d3.nestBy(nodes, d => [d.layer, d.probe_location_idx] + '')
    byStream = d3.sort(byStream, d => d[0].probe_location_idx)
    byStream = d3.sort(byStream, d => d[0].layer == 'E' ? -1 : +d[0].layer)
    byStream.forEach((stream, streamIdx) => {
      stream.forEach(d => {
        d.streamIdx = streamIdx
        d.layerLocationLabel = layerLocationLabel(d.layer, d.probe_location_idx)

        if (!visState.isHideLayer) d.streamIdx = isFinite(d.layer) ? +d.layer + 1 : 0
      })
    })

    // add target_logit_effect__ columns for each logit
    var logitNodeMap = new Map(nodes.filter(d => d.isLogit).map(d => [d.node_id, d.logitToken]))
    nodes.forEach(node => {
      node.targetLinks.forEach(link => {
        if (!logitNodeMap.has(link.target)) return
        node[`target_logit_effect__${logitNodeMap.get(link.target)}`] = link.weight
      })
    })

    // add ppClerp
    await Promise.all(nodes.map(async d => {
      if (!d.clerp) d.clerp = ''
      d.remoteClerp = ''
    }))

    // condense nodes into features, using last occurence of feature if necessary to point to a node
    var features = d3.nestBy(nodes.filter(d => d.isFeature), d => d.featureId)
      .map(d => ({
        featureId: d[0].featureId,
        feature_type: d[0].feature_type,
        clerp: d[0].clerp,
        remoteClerp: d[0].remoteClerp,
        layer: d[0].layer,
        streamIdx: d[0].streamIdx,
        probe_location_idx: d[0].probe_location_idx,
        featureIndex: d[0].featureIndex,
        top_logit_effects: d[0].top_logit_effects,
        bottom_logit_effects: d[0].bottom_logit_effects,
        top_embedding_effects: d[0].top_embedding_effects,
        bottom_embedding_effects: d[0].bottom_embedding_effects,
        url: d[0].url,
        lastNodeId: d.at(-1).nodeId,
        isLogit: d[0].isLogit,
        isError: d[0].isError,
        feature_type: d[0].feature_type,
      }))

    nodes.idToNode = idToNode
    features.idToFeature = Object.fromEntries(features.map(d => [d.featureId, d]))
    links.idToLink = Object.fromEntries(links.map(d => [d.linkId, d]))

    // Create a copy of the data object with the new properties
    return { ...data, nodes, features, links, byStream };
  }

  function initBcSync({visState, renderAll}){
    var bcStateSync = window.bcSync = window.bcSync ||  new BroadcastChannel('state-sync')

    function broadcastState(){
      if (!visState.isSyncEnabled) return
      bcStateSync.postMessage({
        pinnedIds: visState.pinnedIds,
        hiddenIds: visState.hiddenIds,
        clickedId: visState.clickedId,
        hoveredId: visState.hoveredId,
        pageUUID: visState.pageUUID,
        isSyncEnabled: visState.isSyncEnabled,
      })
    }

    renderAll.pinnedIds.fns.push(ev => { if (!ev?.skipBroadcast) broadcastState() })
    renderAll.hiddenIds.fns.push(ev => { if (!ev?.skipBroadcast) broadcastState() })
    renderAll.clickedId.fns.push(ev => { if (!ev?.skipBroadcast) broadcastState() })
    renderAll.hoveredId.fns.push(ev => { if (!ev?.skipBroadcast) broadcastState() })

    bcStateSync.onmessage = ev => {
      if (!visState.isSyncEnabled) return
      if (visState.isSyncEnabled != ev.data.isSyncEnabled) return
      if (ev.data.pageUUID == visState.pageUUID) return

      if (JSON.stringify(visState.pinnedIds) != JSON.stringify(ev.data.pinnedIds)){
        visState.pinnedIds = ev.data.pinnedIds
        renderAll.pinnedIds({skipBroadcast: true})
      }

      if (JSON.stringify(visState.hiddenIds) != JSON.stringify(ev.data.hiddenIds)){
        visState.hiddenIds = ev.data.hiddenIds
        renderAll.hiddenIds({skipBroadcast: true})
      }

      if (visState.clickedId != ev.data.clickedId){
        visState.clickedId = ev.data.clickedId
        renderAll.clickedId({skipBroadcast: true})
      }

      if (visState.hoveredId != ev.data.hoveredId){
        visState.hoveredId = ev.data.hoveredId
        renderAll.hoveredId({skipBroadcast: true})
      }
    }
  }

  function addFeatureEvents(visState, renderAll) {
    return function(selection) {
      selection
        .on('mouseover', (ev, d) => {
          if (ev.shiftKey) return
          if (visState.subgraph?.activeGrouping.isActive) return
          if (visState.subgraph?.activeGrouping.isDragging) return
          ev.preventDefault()
          hoverFeature(visState, renderAll, d)
        })
        .on('mouseout', (ev, d) => {
          if (ev.shiftKey) return
          if (visState.subgraph?.activeGrouping.isActive) return
          if (visState.subgraph?.activeGrouping.isDragging) return
          ev.preventDefault()
          unHoverFeature(visState, renderAll)
        })
        .on('click', (ev, d) => {
          if (visState.subgraph?.activeGrouping.isActive) return
          clickFeature(visState, renderAll, d, ev.metaKey || ev.ctrlKey)
        })
    }
  }

  function hoverFeature(visState, renderAll, d) {
    if (d.nodeId.includes('supernode-')) return

    if (visState.hoveredId != d.featureId) {
      visState.hoveredId = d.featureId
      visState.hoveredCtxIdx = d.ctx_idx
      renderAll.hoveredId()
    }
  }

  function unHoverFeature(visState, renderAll) {
    if (visState.hoveredId) {
      visState.hoveredId = null
      visState.hoveredCtxIdx = null
      setTimeout(() => {
        if (!visState.hoveredId) renderAll.hoveredId()
      })
    }
  }
  function togglePinned(visState, renderAll, d) {
    var index = visState.pinnedIds.indexOf(d.nodeId)
    if (index == -1) {
      visState.pinnedIds.push(d.nodeId)
    } else {
      visState.pinnedIds.splice(index, 1)
    }
    util.params.set('pinnedIds', visState.pinnedIds.join(','))
    renderAll.pinnedIds()
  }

  function clickFeature(visState, renderAll, d, metaKey){
    console.log(d)
    if (d.nodeId.includes('supernode-')) return

    if (metaKey && visState.isEditMode) {
      togglePinned(visState, renderAll, d)
    } else {
      if (visState.clickedId == d.nodeId) {
        visState.clickedId = null
        visState.clickedCtxIdx = null
      } else {
        visState.clickedId = d.nodeId
        visState.clickedCtxIdx = d.ctx_idx
      }
      visState.hoveredId = null
      visState.hoveredCtxIdx = null
      renderAll.clickedId()
    }
  }

  function showTooltip(ev, d) {
    let tooltipSel = d3.select('.tooltip'),
        x = ev.clientX,
        y = ev.clientY,
        bb = tooltipSel.node().getBoundingClientRect(),
        left = d3.clamp(20, (x-bb.width/2), window.innerWidth - bb.width - 20),
        top = innerHeight > y + 20 + bb.height ? y + 20 : y - bb.height - 20;

    let tooltipHtml = !ev.metaKey ? (d.ppClerp || `F#${d.feature}`) : Object.keys(d)
      .filter(str => typeof d[str] != 'object' && typeof d[str] != 'function' && !keysToSkip.has(str))
      .map(str => {
        var val = d[str]
        if (typeof val == 'number' && !Number.isInteger(val)) val = val.toFixed(6)
        return `<div>${str}: <b>${val}</b></div>`
      })
      .join('')

    tooltipSel
      .style('left', left +'px')
      .style('top', top + 'px')
      .html(tooltipHtml)
      .classed('tooltip-hidden', false)
  }

  function addFeatureTooltip(selection){
    selection
      .call(d3.attachTooltip, d3.select('.tooltip'), [])
      .on('mouseover.tt', (ev, d) => {
        var tooltipHtml = !ev.metaKey ? d.ppClerp : Object.keys(d)
          .filter(str => typeof d[str] != 'object' && typeof d[str] != 'function' && !keysToSkip.has(str))
          .map(str => {
            var val = d[str]
            if (typeof val == 'number' && !Number.isInteger(val)) val = val.toFixed(6)
            return `<div>${str}: <b>${val}</b></div>`
          })
          .join('')

        d3.select('.tooltip').html(tooltipHtml)
      })
  }

  function hideTooltip() {
    d3.select('.tooltip').classed('tooltip-hidden', true);
  }

  function updateFeatureStyles(nodeSel){
    nodeSel.call(classAndRaise('hovered', e => e.featureId == visState.hoveredId))

    var pinnedIdSet = new Set(visState.pinnedIds)
    nodeSel.call(classAndRaise('pinned', d => pinnedIdSet.has(d.nodeId)))

    var hiddenIdSet = new Set(visState.hiddenIds)
    nodeSel.call(classAndRaise('hidden', d => hiddenIdSet.has(d.featureId)))

    if (nodeSel.datum().nodeId){
      nodeSel.call(classAndRaise('clicked', e => e.nodeId === visState.clickedId))
    } else {
      nodeSel.call(classAndRaise('clicked', d => d.featureId == visState.clickedId))
    }
  }

  function classAndRaise(className, filterFn) {
    return sel => {
      sel
        .classed(className, 0)
        .filter(filterFn)
        .classed(className, 1)
        .raise()
    }
  }

  var keysToSkip = new Set([
    'node_id', 'jsNodeId', 'nodeId', 'layerLocationLabel', 'remoteClerp', 'localClerp',
    'tmpClickedTargetLink', 'tmpClickedLink', 'tmpClickedSourceLink',
    'pos', 'xOffset', 'yOffset', 'sourceLinks', 'targetLinks', 'url', 'vis_link', 'run_idx',
    'featureId', 'active_feature_idx', 'nodeIndex', 'isFeature', 'Distribution',
    'clerp', 'ppClerp', 'is_target_logit', 'token_prob', 'reverse_ctx_idx', 'ctx_from_end', 'feature', 'logitToken',
    'featureIndex', 'streamIdx', 'nodeColor', 'umap_enc_x', 'umap_enc_y', 'umap_dec_x', 'umap_dec_y', 'umap_concat_x', 'umap_concat_y',
  ])


  function layerLocationLabel(layer, location) {
    if (layer == 'E') return 'Emb'
    if (layer == 'E1') return 'Lgt'
    if (location === -1) return 'logit'

    // TODO: is stream probe_location_idx no longer be saved out?
    // NOTE: For now, location is literally ProbePointLocation
    return `L${layer}`
  }

  var memoize = fn => {
    var cache = new Map()
    return (...args) => {
      var key = JSON.stringify(args)
      if (cache.has(key)) return cache.get(key)
      var result = fn(...args)
      cache.set(key, result)
      return result
    }
  }

  var bgColorToTextColor = memoize((backgroundColor, light='#fff', dark='#000') => {
    if (!backgroundColor) return ''
    var hsl = d3.hsl(backgroundColor)
    return hsl.l > 0.55 ? dark : light
  })

  // gradient for hover && pinned state
  function addPinnedClickedGradient(svg){
    svg.append('defs').html(`
      <linearGradient id='pinned-clicked-gradient' x1='0' x2='2' gradientUnits='userSpaceOnUse' spreadMethod='repeat'>
        <stop offset='0'    stop-color='#f0f' />
        <stop offset='70%'  stop-color='#f0f' />
        <stop offset='71%'  stop-color='#000' />
        <stop offset='100%' stop-color='#000' />
      </linearGradient>
    `)
  }

  function renderFeatureRow(sel, visState, renderAll, linkKey='tmpClickedLink'){
    sel.st({
      background: d => d[linkKey]?.tmpColor,
      color: d => bgColorToTextColor(d[linkKey]?.tmpColor, '#eee', '#555'),
    })

    // add events in a timeout to avoid connection clicks leading to an instant hover
    setTimeout(() => sel.call(addFeatureEvents(visState, renderAll)), 16)

    let featureIconSel = sel.append('svg')
      .at({width: 10, height: 10})

    let featureIcon = featureIconSel.append('g')

    featureIcon.append('g.default-icon').append('text')
      .text(d => featureTypeToText(d.feature_type))
      .at({
        fontSize: 9,
        textAnchor: 'middle',
        dominantBaseline: 'central',
        dx: 5,
        dy: 4,
      })
      .at({fill: d => d[linkKey]?.tmpColor})


    sel.append('div.label')
      .text(d => d.ppClerp)
      .at({ title: d => d.ppClerp })

    sel
      .filter(d => d[linkKey] && d[linkKey].tmpClickedCtxOffset != 0)
      .append('div.ctx-offset')
      .text(d => d[linkKey].tmpClickedCtxOffset < 0 ? '←' : '→')

    if (!visState.isHideLayer){
      sel.append('div.layer')
        .text(d => d.layerLocationLabel ?? layerLocationLabel(d.layer, d.probe_location_idx));
    }

    sel.append('div.weight')
      .text(d => d[linkKey] ? d3.format('+.3f')(d[linkKey].weight) : '')
  }

  function featureTypeToText(type){
    if (type == 'logit') return '■'
    if (type == 'embedding') return '■'
    if (type === 'mlp reconstruction error') return '◆'
    return '●'

  }


  return {
    loadDatapath,
    formatData,
    initBcSync,
    addFeatureEvents,
    hoverFeature,
    unHoverFeature,
    clickFeature,
    togglePinned,
    layerLocationLabel,
    keysToSkip,
    addFeatureTooltip,
    showTooltip,
    hideTooltip,
    updateFeatureStyles,
    memoize,
    bgColorToTextColor,
    addPinnedClickedGradient,
    renderFeatureRow,
    saveHClerpsToLocalStorage,
    getHClerpsFromLocalStorage,
    hClerpUpdateFn,
    deDupHClerps,
    tabifyHClerps,
    featureTypeToText,
  }
})()

window.init?.()

</script>
<script>
/**
 * Render activation histogram for the selected feature.
 *
 * @param {Object} params - Parameters for rendering.
 * @param {d3.Selection} params.featureTitleSel - Selection of the feature title element.
 * @param {string} params.scan - Scan identifier used to load the feature data.
 * @param {Object} params.featureNode - The feature node object containing feature data.
 * @param {Object} params.featureExamples - The feature examples object used to load feature data.
 */

// Histogram size constants
const HISTOGRAM_CONTAINER_WIDTH = 240;
const HISTOGRAM_CONTAINER_HEIGHT = 160;
const HISTOGRAM_SVG_WIDTH = 220;
const HISTOGRAM_SVG_HEIGHT = 140;

window.renderActHistogram = function({ featureTitleSel, scan, featureNode, featureExamples }) {
  const dataPromise = featureExamples.loadFeature(scan, featureNode.featureIndex)
  const placeholderSel = featureTitleSel
    .on('mouseenter', function () {
      d3.select(this).select('.histogram-placeholder').style('display', 'block');
    })
    .on('mouseleave', function () {
      d3.select(this).select('.histogram-placeholder').style('display', 'none');
    })
    .append('div.histogram-placeholder')
    .style('display', 'none')
    .style('position', 'absolute')
    .style('width', `${HISTOGRAM_CONTAINER_WIDTH}px`)
    .style('height', `${HISTOGRAM_CONTAINER_HEIGHT}px`)
    .style('background-color', '#fff')
    .style('border-radius', '8px')
    .style('border', '1px solid #ddd')
    .style('top', `-${HISTOGRAM_CONTAINER_HEIGHT - 40}px`)
    .style('left', '120px')
    .style('z-index', '1000000')
    .style('box-shadow', '0 3px 10px rgba(0,0,0,0.15)')
    .style('padding', '10px');

  const svg = placeholderSel.append('svg')
    .style('width', '100%')
    .style('height', '100%');

  dataPromise.then(featureData => {
    let quantileInfo = '';
    if (featureData && featureData.quantile_values) {
      const quantileValues = featureData.quantile_values;
      let quantile = 0;
      for (let i = 0; i < quantileValues.length; i++) {
        if (featureNode.activation <= quantileValues[i]) {
          quantile = i + 1;
          break;
        }
      }
      if (quantile === 0 && featureNode.activation > quantileValues[quantileValues.length - 1]) {
        quantile = 100;
      }
      quantileInfo = ` ${quantile}pct`;
    }
    featureTitleSel.select('span').text(
      `Act: ${featureNode.activation.toFixed(2)}${quantileInfo}${featureData.activation_frequency !== undefined ? `, Freq: ${(featureData.activation_frequency * 100).toFixed(3)}%` : ''}`
    );
  });

  dataPromise
    .then(featureData => {
      if (!(featureData && featureData.histogram)) return;
      drawHistogram(svg, featureData.histogram, featureNode.activation, featureData.act_min || 0, featureData.act_max || 1);
    })
    .catch(error => {
      console.error('Error loading histogram data:', error);
    });
};

function drawHistogram(svg, histogramData, currentActivation, actMin, actMax) {
  const width = HISTOGRAM_SVG_WIDTH;
  const height = HISTOGRAM_SVG_HEIGHT;
  const margin = { top: 10, right: 10, bottom: 30, left: 10 };

  const maxValue = Math.max(...histogramData);

  const xScale = d3.scaleLinear()
    .domain([0, histogramData.length - 1])
    .range([margin.left, width - margin.right]);

  const yScale = d3.scaleLinear()
    .domain([0, maxValue])
    .range([height - margin.bottom, margin.top]);

  const binPosition = Math.max(
    0,
    Math.min(
      histogramData.length - 1,
      Math.floor(((currentActivation - actMin) / (actMax - actMin)) * histogramData.length)
    )
  );

  svg.html('');

  svg.append('text')
    .attr('x', width / 2)
    .attr('y', 8)
    .attr('text-anchor', 'middle')
    .style('font-size', '10px')
    .style('font-weight', 'bold')
    .text('Activation Distribution');

  svg.selectAll('.bar')
    .data(histogramData)
    .enter()
    .append('rect')
    .attr('class', 'bar')
    .attr('x', (d, i) => xScale(i))
    .attr('width', width / histogramData.length)
    .attr('y', d => yScale(d))
    .attr('height', d => height - margin.bottom - yScale(d))
    .attr('fill', '#e67e22')
    .attr('opacity', 0.8)
    .attr('shape-rendering', 'crispEdges');

  svg.append('line')
    .attr('x1', xScale(binPosition))
    .attr('y1', margin.top)
    .attr('x2', xScale(binPosition))
    .attr('y2', height - margin.bottom)
    .attr('stroke', '#2980b9')
    .attr('stroke-width', 2)
    .attr('stroke-dasharray', '4,2');

  svg.append('text')
    .attr('x', xScale(binPosition))
    .attr('y', margin.top + 10)
    .attr('text-anchor', 'middle')
    .style('font-size', '8px')
    .style('font-weight', 'bold')
    .style('fill', '#2980b9')
    .text('Current');

  svg.append('line')
    .attr('x1', margin.left)
    .attr('y1', height - margin.bottom)
    .attr('x2', width - margin.right)
    .attr('y2', height - margin.bottom)
    .attr('stroke', '#777')
    .attr('stroke-width', 1);

  svg.append('line')
    .attr('x1', margin.left)
    .attr('y1', margin.top)
    .attr('x2', margin.left)
    .attr('y2', height - margin.bottom)
    .attr('stroke', '#777')
    .attr('stroke-width', 1);

  svg.append('text')
    .attr('x', margin.left)
    .attr('y', height - margin.bottom + 15)
    .attr('text-anchor', 'middle')
    .style('font-size', '9px')
    .text(actMin.toFixed(2));

  svg.append('text')
    .attr('x', width - margin.right)
    .attr('y', height - margin.bottom + 15)
    .attr('text-anchor', 'middle')
    .style('font-size', '9px')
    .text(actMax.toFixed(2));

  const numTicks = 5;
  for (let i = 0; i < numTicks; i++) {
    const xPos = margin.left + (i * (width - margin.left - margin.right) / (numTicks - 1));
    svg.append('line')
      .attr('x1', xPos)
      .attr('y1', height - margin.bottom)
      .attr('x2', xPos)
      .attr('y2', height - margin.bottom + 3)
      .attr('stroke', '#777')
      .attr('stroke-width', 1);
  }

  svg.append('text')
    .attr('x', width / 2)
    .attr('y', height - 5)
    .attr('text-anchor', 'middle')
    .style('font-size', '8px')
    .text('Activation Value');
}

</script>
<script>
window.initGridsnap = function({
  gridData = [],
  maxX = null,
  isFullScreenY = true,
  pad = 10,
  gridSizeY = 80,
  isFillContainer,
  sel = d3.select('.gridsnap'),
  repositionFn = null,
  serializedGrid = '',
} = {}){
  var gridsnap = {gridData, serializeGrid, deserializeGrid}

  gridData.forEach((d, i) => {
    d.next = {...d.cur}
    d.class = d.class === undefined ? i : d.class
  })

  var maxX = maxX || d3.max(gridData, d => d.cur.x + d.cur.w)
  function calcgridSizeX(){
    return (sel.node().offsetWidth)/maxX
  }
  var gridSizeX = calcgridSizeX()

  // TODO: bubble events first
  function calcGridSizeY() {
    if (!isFillContainer) return gridSizeY
    return sel.node().offsetHeight/(d3.max(gridData, d => d.cur.y + d.cur.h) || 1)
  }

  gridSizeY = calcGridSizeY()

  var resizeKey = 'resize.gridsnap' + serializedGrid
  d3.select(window).on(resizeKey, util.throttle(() => {
    var newX = calcgridSizeX()
    var newY = calcGridSizeY()
    if (newX == gridSizeX && newY == gridSizeY) return

    gridSizeX = newX
    gridSizeY = newY
    renderPositions()


    gridItemSel.each(d => d.resizeFn?.())
  }, 500))

  var gridsnapSel = sel.html('').append('div.gridsnap-container')

  var gridItemSel = gridsnapSel.appendMany('div.grid-item', gridData)
    .each(function(d){ d.sel = d3.select(this).append('div.grid-contents').classed(d.class, 1) })

  gridItemSel.append('div.move-handle')
    .text('✣')
    .call(makeDragFn(false))
  gridItemSel.append('div.resize-handle')
    .text('↘')
    .call(makeDragFn(true))

  var previewSel = gridsnapSel.append('div.preview.grid-item')

  function makeDragFn(isResize) {
    return d3.drag()
      .subject((ev, d) => ({
        x: (d.cur.x + (isResize ? d.cur.w : 0))*gridSizeX,
        y: (d.cur.y + (isResize ? d.cur.h : 0))*gridSizeY
      }))
      .container(function(){ return this.parentNode.parentNode })
      .on('start', function(ev, d){
        gridData.forEach(d => d.next = {...d.cur})
        d.dragStart = {...d.cur}

        gridsnapSel.classed('dragging', 1)
        d3.select(this.parentNode).classed('dragging', 1)
        previewSel.st({'display': ''})
      })
      .on('end', (ev, d) => {
        gridData.forEach(d => d.cur = {...d.next})

        gridsnapSel.classed('dragging', 0)
        gridItemSel.classed('dragging', 0)
        previewSel.st({'display': 'none'})
        renderPositions()

        if (isResize) d.resizeFn?.()
      })
      .on('drag', isResize ? resize : drag)

    function drag(ev, d) {
      d.cur.x = ev.x/gridSizeX
      d.cur.y = ev.y/gridSizeY

      pushGrid(d)
      renderPositions(d)
    }

    function resize(ev, d) {
      d.cur.x = d.dragStart.x
      d.cur.y = d.dragStart.y

      d.cur.w = ev.x/gridSizeX - d.dragStart.x
      d.cur.h = ev.y/gridSizeY - d.dragStart.y
      if (d.cur.w < 0) {
        d.cur.x += d.cur.w
        d.cur.w = d.dragStart.w - d.cur.w
      }
      if (d.cur.h < 0) {
        d.cur.y += d.cur.h
        d.cur.h = d.dragStart.h - d.cur.h
      }

      pushGrid(d)
      renderPositions(d)
    }
  }


  function pushGrid(active) {
    if (active) active.next = snapToGrid(active.cur)

    var sortedGridData = d3.sort(gridData, d => d != active)
    sortedGridData = d3.sort(sortedGridData, d => d == active ? d.cur.y : d.next.y)

    var topArray = d3.range(maxX).map(d => 0)
    sortedGridData.forEach(d => {
      var {x, y, w, h} = d.next
      d.next.y = d3.max(d3.range(w), i => topArray[x + i])
      d3.range(w).forEach(i => topArray[x + i] = d.next.y + h)
    })

    function snapToGrid({x, y, w, h}) {
      var rv = {x: Math.max(0, Math.round(x)), y: Math.max(0, Math.round(y)), w: Math.max(1, Math.round(w)), h: Math.max(1, Math.round(h))}
      if (rv.x + rv.w > maxX) rv.x = Math.max(0, maxX - rv.w)
      return rv
    }
  }

  function renderPositions(active){
    gridItemSel.call(renderGridItem, 'next')

    if (active){
      gridItemSel.filter(d => d == active).call(renderGridItem, 'cur')
      previewSel.datum(active).call(renderGridItem, 'next')
    } else{
      if (!isFillContainer){
        var maxY = Math.max(maxY, d3.max(gridData, d => d.next.y + d.next.h))
        gridsnapSel.st({height: Math.max(isFullScreenY ? window.innerHeight : 0, maxY*gridSizeY + pad) + 'px'})
      }
    }

    repositionFn?.(gridsnap)

    function renderGridItem(itemSel, key) {
      itemSel
        .translate(d => [d[key].x*gridSizeX + pad/2, d[key].y*gridSizeY + pad/2].map(Math.round))
        .st({
          width: d => Math.round(Math.max(0, d[key].w*gridSizeX - pad)), // negative sizes bug out
          height: d => Math.round(Math.max(0, d[key].h*gridSizeY - pad))
        })
    }
  }

  function serializeGrid(){
    return gridData.map(d => {
      var {x, y, w, h} = d.cur
      return `${d.class}${[x, y, w, h].map(d3.format('02d')).join('')}`
    }).join('_')
  }

  function deserializeGrid(serializedGrid){
    serializedGrid?.split('_').forEach(str => {
      var match = str.match(/^([\w-]+)(\d{8})$/)
      if (!match) return
      var [_, className, coords] = match

      var [x, y, w, h] = d3.range(4).map(i => +coords.substr(i*2, 2))
      var gridItem = gridData.find(d => d.class == className)
      if (gridItem) gridItem.next = {x, y, w, h}
    })

    pushGrid()
    gridData.forEach(d => d.cur = {...d.next})
    renderPositions()
  }

  deserializeGrid(serializedGrid)

  return gridsnap
}

window.init?.()
